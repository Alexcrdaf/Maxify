<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Maxify - Liquid Glass Edition</title>
<script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Тёмная тема - Глубокое космическое жидкое стекло iOS 26 */
  --bg: #03060f;
  --bg-image: radial-gradient(circle at 80% 10%, rgba(79, 140, 255, 0.15) 0%, transparent 50%),
              radial-gradient(circle at 20% 80%, rgba(155, 140, 255, 0.12) 0%, transparent 50%),
              radial-gradient(circle at 50% 50%, rgba(7, 10, 22, 1) 0%, rgba(3, 6, 15, 1) 100%);
  --panel: rgba(255, 255, 255, 0.03);
  --glass-bg: rgba(10, 15, 30, 0.35);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shine: inset 0 1px 1px 0 rgba(255, 255, 255, 0.12), 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #2f80ed;
  --accent-grad: linear-gradient(135deg, #4da1ff 0%, #0056c6 100%);
  --glow: rgba(77, 161, 255, 0.35);
  --text: #f1f3f9;
  --muted: rgba(241, 243, 249, 0.45);
  --danger: #ff4a6b;
  --ok: #2fd695;
  --input-bg: rgba(255, 255, 255, 0.04);
  --bubble-mine: linear-gradient(135deg, rgba(47, 128, 237, 0.25) 0%, rgba(47, 128, 237, 0.15) 100%);
  --bubble-mine-border: rgba(47, 128, 237, 0.35);
  --bubble-their: rgba(255, 255, 255, 0.04);
  --bubble-their-border: rgba(255, 255, 255, 0.07);
  --attach-bg: rgba(13, 18, 35, 0.85);
  --nav-bg: rgba(5, 8, 20, 0.45);
  --pinned-bg: rgba(47, 128, 237, 0.08);
  --reply-bg: rgba(255, 255, 255, 0.03);
  --reaction-bg: rgba(255, 255, 255, 0.05);
  --reaction-mine: rgba(47, 128, 237, 0.2);
  --nav-h: 74px;
  --card-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
}

body.light {
  /* Светлая тема - Глянцевое морозное жидкое стекло iOS 26 */
  --bg: #f4f6fc;
  --bg-image: radial-gradient(circle at 80% 10%, rgba(47, 128, 237, 0.12) 0%, transparent 50%),
              radial-gradient(circle at 20% 80%, rgba(155, 140, 255, 0.08) 0%, transparent 50%),
              radial-gradient(circle at 50% 50%, #f4f6fc 0%, #e2e8f5 100%);
  --panel: rgba(255, 255, 255, 0.35);
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.4);
  --glass-shine: inset 0 1px 2px 0 rgba(255, 255, 255, 0.5), 0 8px 32px 0 rgba(31, 38, 135, 0.05);
  --border: rgba(0, 0, 0, 0.06);
  --accent: #007aff;
  --accent-grad: linear-gradient(135deg, #3498db 0%, #007aff 100%);
  --glow: rgba(0, 122, 255, 0.25);
  --text: #1d1d1f;
  --muted: rgba(29, 29, 31, 0.5);
  --danger: #ff3b30;
  --ok: #34c759;
  --input-bg: rgba(0, 0, 0, 0.03);
  --bubble-mine: linear-gradient(135deg, rgba(0, 122, 255, 0.18) 0%, rgba(0, 122, 255, 0.08) 100%);
  --bubble-mine-border: rgba(0, 122, 255, 0.25);
  --bubble-their: rgba(0, 0, 0, 0.03);
  --bubble-their-border: rgba(0, 0, 0, 0.05);
  --attach-bg: rgba(255, 255, 255, 0.9);
  --nav-bg: rgba(244, 246, 252, 0.5);
  --pinned-bg: rgba(0, 122, 255, 0.06);
  --reply-bg: rgba(0, 0, 0, 0.01);
  --reaction-bg: rgba(0, 0, 0, 0.03);
  --reaction-mine: rgba(0, 122, 255, 0.1);
  --card-shadow: 0 4px 30px rgba(31, 38, 135, 0.04);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg);
  background-image: var(--bg-image);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  user-select: none;
}

.syne {
  font-family: 'Syne', sans-serif;
}

/* Эффект жидкого стекла */
.liquid-glass {
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(210%);
  -webkit-backdrop-filter: blur(30px) saturate(210%);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shine);
}

/* Скроллбары */
::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 10px;
}
body.light ::-webkit-scrollbar-thumb {
  background: rgba(0, 0, 0, 0.08);
}

/* Формы ввода */
input, textarea, select {
  background: var(--input-bg);
  border: 1px solid var(--glass-border);
  color: var(--text);
  border-radius: 14px;
  padding: 12px 16px;
  outline: none;
  font-size: 15px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  width: 100%;
}
input:focus, textarea:focus {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.06);
  box-shadow: 0 0 0 3px var(--glow);
}
body.light input:focus, body.light textarea:focus {
  background: rgba(255, 255, 255, 0.8);
}

/* Кнопки в стиле жидкого стекла */
.btn {
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 14px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.btn-primary {
  background: var(--accent-grad);
  color: #fff;
  box-shadow: 0 8px 24px -4px var(--glow), inset 0 1px 1px rgba(255, 255, 255, 0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px -2px var(--glow), inset 0 1px 1px rgba(255, 255, 255, 0.4);
}
.btn-primary:active {
  transform: translateY(1px) scale(0.97);
  box-shadow: 0 4px 12px -2px var(--glow);
}

.btn-ghost {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  color: var(--text);
  box-shadow: var(--glass-shine);
}
.btn-ghost:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent);
  transform: translateY(-1px);
}
body.light .btn-ghost:hover {
  background: rgba(0, 0, 0, 0.02);
}
.btn-ghost:active {
  transform: translateY(1px) scale(0.97);
}

.btn-danger {
  background: rgba(255, 74, 107, 0.12);
  color: var(--danger);
  border: 1px solid rgba(255, 74, 107, 0.2);
}
.btn-danger:hover {
  background: rgba(255, 74, 107, 0.22);
  transform: translateY(-1px);
}
.btn-danger:active {
  transform: translateY(1px) scale(0.97);
}

.btn-icon {
  width: 42px;
  height: 42px;
  padding: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover {
  background: rgba(47, 128, 237, 0.15);
  transform: scale(1.08);
}
.btn-icon:active {
  transform: scale(0.92);
}

/* Telegram iOS стиль сообщений */
.msg-wrapper {
  display: flex;
  flex-direction: column;
  margin-bottom: 6px;
  max-width: 80%;
  animation: iosPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes iosPop {
  from {
    opacity: 0;
    transform: scale(0.94) translateY(10px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.bubble-mine, .bubble-their {
  padding: 10px 16px;
  font-size: 15px;
  line-height: 1.45;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.bubble-mine {
  background: var(--bubble-mine);
  border: 1px solid var(--bubble-mine-border);
  border-radius: 18px 18px 4px 18px;
  align-self: flex-end;
  color: var(--text);
}

.bubble-their {
  background: var(--bubble-their);
  border: 1px solid var(--bubble-their-border);
  border-radius: 18px 18px 18px 4px;
  align-self: flex-start;
  color: var(--text);
}

/* Структура списков чатов */
.chat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.chat-row:hover {
  background: rgba(255, 255, 255, 0.03);
}
body.light .chat-row:hover {
  background: rgba(0, 0, 0, 0.02);
}
.chat-row.active {
  background: rgba(47, 128, 237, 0.12);
  border-color: rgba(47, 128, 237, 0.2);
}

.dot-on {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--ok);
  border: 2px solid var(--bg);
  position: absolute;
  bottom: 0px;
  right: 0px;
  box-shadow: 0 0 10px var(--ok);
  animation: pulseGreen 2.2s infinite;
}

@keyframes pulseGreen {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.85; }
}

/* Элегантные элементы UI iOS звонков */
.call-wrap {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(13, 18, 35, 0.98) 0%, rgba(3, 6, 15, 1) 100%);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 60px 24px;
}

/* Анимированный волновой эффект */
.ring-anim {
  animation: pulseGlow 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
}

@keyframes pulseGlow {
  0% { box-shadow: 0 0 0 0 rgba(47, 128, 237, 0.4); }
  70% { box-shadow: 0 0 0 20px rgba(47, 128, 237, 0); }
  100% { box-shadow: 0 0 0 0 rgba(47, 128, 237, 0); }
}

/* Закреплённые сообщения */
.pinned-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--pinned-bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.pinned-line {
  width: 3px;
  height: 28px;
  border-radius: 1.5px;
  background: var(--accent);
}

/* iOS Модальные окна снизу */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(16px) saturate(120%);
  -webkit-backdrop-filter: blur(16px) saturate(120%);
  z-index: 900;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: iosFadeIn 0.3s ease both;
}

.modal {
  border-radius: 28px 28px 0 0;
  padding: 30px 24px calc(30px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 500px;
  max-height: 88vh;
  overflow-y: auto;
  border: 1px solid var(--glass-border);
  border-bottom: none;
  background: var(--glass-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.25);
  animation: iosSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes iosFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes iosSlideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* Реакции */
.reactions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.reaction-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 99px;
  background: var(--reaction-bg);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.reaction-chip:hover {
  transform: scale(1.1);
  background: rgba(255, 255, 255, 0.12);
}
.reaction-chip.mine {
  background: var(--reaction-mine);
  border-color: var(--accent);
}

/* Истории */
.stories-bar {
  display: flex;
  gap: 14px;
  padding: 16px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.stories-bar::-webkit-scrollbar {
  display: none;
}
.story-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  flex-shrink: 0;
}
.story-ring {
  width: 66px;
  height: 66px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, #00f0ff, #007aff, #9b8cff, #ff007f);
  position: relative;
  transition: transform 0.2s;
}
.story-ring:hover {
  transform: scale(1.04);
}
.story-ring-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--bg);
}

/* Лента постов */
.feed-post {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--card-shadow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* ПК И МОБИЛЬНАЯ СЕТКА (iOS 26 Liquid Glass) */
.app-layout {
  height: 100vh;
  display: flex;
  padding: 20px;
  gap: 16px;
  max-width: 1440px;
  margin: 0 auto;
}

.sidebar {
  width: 320px;
  border-radius: 24px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

.main-area {
  flex: 1;
  border-radius: 24px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.tab-bar {
  background: rgba(255, 255, 255, 0.03);
  padding: 4px;
  border-radius: 12px;
  display: flex;
  gap: 2px;
}
body.light .tab-bar {
  background: rgba(0, 0, 0, 0.02);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.tab.active {
  background: var(--glass-bg);
  color: var(--accent);
  box-shadow: var(--glass-shine);
}

/* Для мобильных устройств */
@media(max-width: 768px) {
  .app-layout {
    padding: 0;
    gap: 0;
    height: 100dvh;
    flex-direction: column;
  }
  .sidebar {
    display: none !important;
  }
  .main-area {
    border-radius: 0;
    margin-bottom: var(--nav-h);
    height: calc(100% - var(--nav-h));
  }
  .chat-header {
    padding-top: max(16px, env(safe-area-inset-top)) !important;
  }
  .mobile-nav {
    display: flex !important;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-h);
    padding-bottom: env(safe-area-inset-bottom);
    background: var(--nav-bg);
    backdrop-filter: blur(35px) saturate(210%);
    -webkit-backdrop-filter: blur(35px) saturate(210%);
    border-top: 1px solid var(--glass-border);
    z-index: 500;
    align-items: center;
    justify-content: space-around;
    box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.15);
  }
  .mobile-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 16px;
    color: var(--muted);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
  }
  .mobile-nav-btn.active {
    color: var(--accent);
    transform: translateY(-2px);
  }
  .mobile-list-overlay {
    display: flex !important;
    position: fixed;
    inset: 0;
    bottom: var(--nav-h);
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
  }
  .mobile-list-header {
    padding-top: max(16px, env(safe-area-inset-top)) !important;
    border-bottom: 1px solid var(--border);
  }
  .input-wrap {
    padding-bottom: calc(12px + env(safe-area-inset-bottom)) !important;
  }
}

@media(min-width: 769px) {
  .mobile-nav {
    display: none !important;
  }
  .mobile-list-overlay {
    display: none !important;
  }
}
</style>
</head>
<body>
<div id="root" style="height:100vh"></div>
<script>
window.addEventListener('DOMContentLoaded', () => {
// ── SECURITY: DevTools detection (Защита сохранена в исходном виде) ─────────
(function(){
  'use strict';
  let _blocked = false;
  let _dtOpen = false;

  function showBlock(){
    if(_blocked) return;
    _blocked = true;
    const el = document.createElement('div');
    el.id = '__sec_overlay';
    el.style.cssText = [
      'position:fixed','inset:0','z-index:999999',
      'background:#03060f','display:flex','flex-direction:column',
      'align-items:center','justify-content:center','gap:16px',
      'font-family:sans-serif'
    ].join(';');
    el.innerHTML = `
      <div style="font-size:48px">🔒</div>
      <div style="color:#dde1f0;font-size:22px;font-weight:800;letter-spacing:-.03em">Доступ заблокирован</div>
      <div style="color:rgba(221,225,240,.45);font-size:14px;text-align:center;max-width:340px;line-height:1.7">
        Инструменты разработчика не допускаются.<br>
        Закройте DevTools и обновите страницу.
      </div>
      <button onclick="location.reload()" style="margin-top:8px;background:#2f80ed;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-weight:700;font-size:14px;cursor:pointer;">
        Обновить страницу
      </button>`;
    document.body.appendChild(el);
    const root = document.getElementById('root');
    if(root) root.style.display = 'none';
  }

  function hideBlock(){
    _blocked = false;
    _dtOpen = false;
    const el = document.getElementById('__sec_overlay');
    if(el) el.remove();
    const root = document.getElementById('root');
    if(root) root.style.display = '';
  }

  function isDevToolsOpen(){
    if(window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) return true;
    const t0 = performance.now();
    debugger;
    const t1 = performance.now();
    if((t1 - t0) > 150) return true;
    return false;
  }

  setInterval(function(){
    if(document.visibilityState === 'hidden') return;
    if(isDevToolsOpen()){
      if(!_dtOpen){
        _dtOpen = true;
        showBlock();
      }
    } else {
      if(_dtOpen && _blocked){
        hideBlock();
      }
    }
  }, 3000);

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', function(e){
    if(e.key === 'F12') { e.preventDefault(); return false; }
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'||e.key==='C'||e.key==='c')) { e.preventDefault(); return false; }
    if((e.ctrlKey||e.metaKey) && (e.key==='U'||e.key==='u'||e.key==='S'||e.key==='s')) { e.preventDefault(); return false; }
  });

  const _noop = ()=>{};
  try {
    Object.keys({log:1,warn:1,error:1,info:1,debug:1,table:1,dir:1,group:1,groupEnd:1}).forEach(k => {
      try { window.console[k] = _noop; } catch(e2){}
    });
  } catch(e) {}

// ── Multi-provider upload system ─────────────────────────────────────────────
const UPLOAD_PROVIDERS = [
  { type:'cloudinary', cloud:'djdcmj2om', preset:'maxify' },
  { type:'cloudinary', cloud:'djd6tk4mo', preset:'fgh8888888' },
  { type:'imgbb', key:'6b2f4aa4251af974124a1053b9e8b719' },
  { type:'catbox' },
];
let _providerIdx = 0;

async function upload(file, onPct){
  const total = UPLOAD_PROVIDERS.length;
  let lastErr = null;
  for(let attempt=0; attempt<total; attempt++){
    const idx = (_providerIdx + attempt) % total;
    const p = UPLOAD_PROVIDERS[idx];
    try{
      let url;
      if(p.type==='cloudinary'){
        url = await _uploadCloudinary(file, p.cloud, p.preset, onPct);
      } else if(p.type==='imgbb'){
        url = await _uploadImgBB(file, p.key, onPct);
      } else if(p.type==='catbox'){
        url = await _uploadCatbox(file, onPct);
      }
      return url;
    } catch(err){
      lastErr = err;
      _providerIdx = (idx + 1) % total;
    }
  }
  throw new Error('Все загрузчики перегружены: ' + (lastErr?.message||'ошибка'));
}

function _uploadCloudinary(file, cloud, preset, onPct){
  return new Promise((res,rej)=>{
    const fd=new FormData();
    fd.append('file',file);
    fd.append('upload_preset',preset);
    const xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.cloudinary.com/v1_1/'+cloud+'/auto/upload');
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{
      try{const j=JSON.parse(xhr.responseText);if(j.secure_url)res(j.secure_url);else rej(new Error('cloudinary_error'))}
      catch(e){rej(e)}
    };
    xhr.onerror=()=>rej(new Error('network'));
    xhr.send(fd);
  });
}

// ── Image Upload ─────────────────────────────────────────────────────────────
function _uploadImgBB(file, apiKey, onPct){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const base64=reader.result.split(',')[1];
      const fd=new FormData();
      fd.append('image',base64);
      const xhr=new XMLHttpRequest();
      xhr.open('POST','https://api.imgbb.com/1/upload?key='+apiKey);
      xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
      xhr.onload=()=>{
        try{const j=JSON.parse(xhr.responseText);if(j.data?.url)res(j.data.url);else rej(new Error('imgbb_error'))}
        catch(e){rej(e)}
      };
      xhr.onerror=()=>rej(new Error('network'));
      xhr.send(fd);
    };
    reader.readAsDataURL(file);
  });
}

function _uploadCatbox(file, onPct){
  return new Promise((res,rej)=>{
    const fd=new FormData();
    fd.append('reqtype','fileupload');
    fd.append('fileToUpload',file);
    const xhr=new XMLHttpRequest();
    xhr.open('POST','https://catbox.moe/user/api.php');
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{
      const url=xhr.responseText.trim();
      if(url.startsWith('https://'))res(url);else rej(new Error('catbox_error'));
    };
    xhr.onerror=()=>rej(new Error('network'));
    xhr.send(fd);
  });
}

// ── Input Bar ───────────────────────────────────────────────────────────────
function InputBar({onSend,chatName,canWrite=true,editMsg=null,onCancelEdit,replyMsg=null,onCancelReply}){
  const [text,setText]=useState('');
  const [showAttach,setShowAttach]=useState(false);
  const [voiceRec,setVoiceRec]=useState(false);
  const [voiceDur,setVoiceDur]=useState(0);
  const [vnoteMode,setVnoteMode]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [uploadPct,setUploadPct]=useState(0);
  const [uploadErr,setUploadErr]=useState('');
  const fileRef=useRef(),voiceRef=useRef(),voiceStreamRef=useRef(),voiceTO=useRef(),vnoteRef=useRef(),vnoteRecRef=useRef(),vnoteStreamRef=useRef(),sendBtnRef=useRef();

  useEffect(()=>{if(editMsg)setText(editMsg.text||'');else setText('')},[editMsg]);

  const doSend=useCallback(payload=>{
    if(payload.type==='text'&&!payload.text?.trim())return;
    onSend(payload);setText('');playSend();
  },[onSend]);

  const handleFile=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    setUploading(true);setShowAttach(false);setUploadErr('');
    try{
      const url=await upload(file,p=>setUploadPct(p));
      if(file.type.startsWith('image/'))doSend({type:'image',url,name:file.name});
      else if(file.type.startsWith('video/'))doSend({type:'file-video',url,name:file.name});
      else doSend({type:'file',url,name:file.name});
    }catch(ex){setUploadErr('Ошибка загрузки: '+ex.message)}
    setUploading(false);setUploadPct(0);
  };

  const startVoice=async()=>{
    setUploadErr('');
    let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){setUploadErr('Нет микрофона');return}
    voiceStreamRef.current=stream;
    let rec=new MediaRecorder(stream);
    voiceRef.current=rec;setVoiceRec(true);setVoiceDur(0);
    voiceTO.current=setInterval(()=>setVoiceDur(d=>d+1),1000);
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data)};
    rec.onstop=async()=>{
      clearInterval(voiceTO.current);setVoiceRec(false);
      voiceStreamRef.current?.getTracks().forEach(t=>t.stop());
      if(!chunks.length)return;
      setUploading(true);
      try{
        const f=new File([new Blob(chunks)],`voice_${Date.now()}.webm`,{type:'audio/webm'});
        const url=await upload(f,p=>setUploadPct(p));
        doSend({type:'voice',url});
      }catch(ex){setUploadErr(ex.message)}
      setUploading(false);
    };
    rec.start();
  };

  const stopVoice=()=>{if(voiceRef.current?.state!=='inactive')voiceRef.current.stop()};

  if(!canWrite)return h('div',{style:{padding:16,textAlign:'center',color:'var(--muted)',fontSize:13}},'Вам запрещено писать в этот канал');

  return h('div',{style:{flexShrink:0,position:'relative'}},
    replyMsg&&h('div',{className:'reply-bar',style:{padding:'10px 16px',background:'var(--reply-bg)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,h('div',{style:{fontSize:11,color:'var(--accent)',fontWeight:700}},'↩️ Ответ на сообщение'),h('div',{style:{fontSize:13,color:'var(--muted)'}},replyMsg.text||'Вложение')),
      h('button',{style:{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:20},onClick:onCancelReply},'×')
    ),
    editMsg&&h('div',{style:{padding:'8px 16px',background:'var(--panel)',display:'flex',justifyContent:'space-between',fontSize:12}},
      h('div',null,h('span',null,'✏️ Редактирование: '),h('span',{style:{color:'var(--muted)'}},editMsg.text)),
      h('button',{style:{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontWeight:600},onClick:onCancelEdit},'Отмена')
    ),
    uploading&&h('div',{className:'prog-bar',style:{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}},h('div',{className:'prog-fill',style:{width:uploadPct+'%',background:'var(--accent)',height:'100%'}})),
    voiceRec?h('div',{style:{padding:'12px 16px',display:'flex',gap:12,alignItems:'center',background:'var(--glass-bg)',backdropFilter:'blur(20px)'}},
      h('span',{style:{color:'var(--danger)',fontWeight:700}},fmtDur(voiceDur)),
      h('div',{style:{flex:1,height:4,background:'rgba(255,255,255,0.1)',borderRadius:2}}),
      h('button',{className:'btn btn-ghost',onClick:()=>setVoiceRec(false)},'Отмена'),

    h('div',{className:'input-wrap',style:{padding:'12px 16px',display:'flex',gap:10,alignItems:'center',background:'var(--glass-bg)',backdropFilter:'blur(20px)',webkitBackdropFilter:'blur(20px)',borderTop:'1px solid var(--glass-border)',position:'relative'}},
      showAttach&&h('div',{className:'attach-menu liquid-glass',style:{position:'absolute',bottom:'100%',left:16,borderRadius:18,padding:8,display:'flex',flexDirection:'column',gap:2,minWidth:180,boxShadow:'0 10px 30px rgba(0,0,0,0.25)'}},
        h('div',{className:'attach-item',style:{padding:'10px 14px',borderRadius:12,cursor:'pointer'},onClick:()=>{fileRef.current.accept='image/*';fileRef.current.click()}},'🖼️ Изображение'),

function DMChat({me,peer,peerUser,onBack,peerInst}){
  const [msgs,setMsgs]=useState([]);

  useEffect(()=>{

      const v=s.val();

      setMsgs(arr);

    return()=>ref.off();
  },[chatCid]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

    try{stream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVid})}

    call.on('stream',rs=>setCallState(s=>({...s,remoteStream:rs})));
    call.on('close',()=>endCall());

function extractRTId(url){
  if(!url) return null;
  const m = url.match(/rutube\.ru\/(?:video|play\/embed)\/([a-f0-9]{32})/i);
  return m ? m[1] : null;
}

function RutubeTab({me, dmConvs, peerUsers, rooms}){
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [playing, setPlaying] = useState(null);
  const [platform, setPlatform] = useState('rt');

  const search = async(q) => {
    if(!q.trim()) return;
    try {
      const corsProxy = 'https://corsproxy.io/?';
      const url = platform==='yt' 
        ? `https://inv.nadeko.net/api/v1/search?q=${encodeURIComponent(q)}&type=video`
        : `https://rutube.ru/api/search/video/?query=${encodeURIComponent(q)}&format=json`;
      
      const res = await fetch(corsProxy + encodeURIComponent(url));
      const data = await res.json();
      
      if(platform==='yt') {
        setResults(data.map(v=>({id:v.videoId,title:v.title,channel:v.author,thumb:v.videoThumbnails?.[0]?.url||'',src:'yt'})));
      } else {
        const items = data.results || [];
        setResults(items.map(v=>({id:v.id||v.video_id,title:v.title,channel:v.author?.name||'Rutube',thumb:v.thumbnail_url,src:'rt'})));

      h('input',{placeholder:'Поиск видео...',value:query,onChange:e=>setQuery(e.target.value),style:{flex:1}}),

        h('div',{className:'story-ring'},
          h('div',{className:'story-ring-inner'},h('img',{src:allStories[uid][0]?.avatarUrl||''}))
        ),
        h('span',{className:'story-label',style:{fontSize:11,fontWeight:600}},allStories[uid][0]?.login)
      ))
    ),
    viewing&&h(StoryViewer,{stories:viewing.stories,startIdx:0,onClose:()=>setViewing(null),me})
  );
}

// ── Feed System ─────────────────────────────────────────────────────────────
function FeedTab({me, meUser, onOpenProfile}){
  const [posts,setPosts]=useState([]);
  const [showCreate,setShowCreate]=useState(false);
  const [commentPost,setCommentPost]=useState(null);

  useEffect(()=>{
    const ref=db.ref('posts').limitToLast(40);
    ref.on('value',s=>{
      const v=s.val()||{};
      setPosts(Object.entries(v).map(([k,p])=>({k,...p})).sort((a,b)=>b.ts-a.ts));
    });
    return()=>ref.off();
  },[]);

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h(StoriesBar,{me,meUser}),
    h('div',{style:{padding:'12px 16px',borderBottom:'1px solid var(--border)'}},
      h('button',{className:'btn btn-ghost',style:{width:'100%',justifyContent:'flex-start',borderRadius:16,padding:'10px 14px'},onClick:()=>setShowCreate(true)},'📝 Опубликовать новый пост...')
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:16}},
      posts.map(p=>h('div',{key:p.k,className:'feed-post',style:{padding:16,marginBottom:14}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},
          h(Avatar,{user:{id:p.uid,login:p.login,avatarUrl:p.avatarUrl},size:38}),
          h('div',{style:{flex:1,cursor:'pointer'},onClick:()=>onOpenProfile(p.uid)},
            h('div',{style:{fontWeight:700,fontSize:14}},p.login),
            h('div',{style:{fontSize:11,color:'var(--muted)'}},ts2d(p.ts))
          )
        ),
        p.text&&h('div',{style:{fontSize:14,lineHeight:1.5,marginBottom:10}},p.text),
        p.mediaUrl&&(p.mediaType==='video'
          ?h('video',{src:p.mediaUrl,controls:true,style:{width:'100%',borderRadius:14,maxHeight:300}})
          :h('img',{src:p.mediaUrl,style:{width:'100%',borderRadius:14,maxHeight:300,objectFit:'cover'}})
        ),
        h('div',{style:{display:'flex',gap:14,marginTop:12}},
          h('button',{className:'btn btn-ghost',onClick:async()=>{
            const path=`posts/${p.k}/likes/${me}`;
            const snap=await db.ref(path).once('value');
            if(snap.val())await db.ref(path).remove();else await db.ref(path).set(true);
          }},'❤️ '+(p.likes?Object.keys(p.likes).length:'')),
          h('button',{className:'btn btn-ghost',onClick:()=>setCommentPost(p)},'💬 Комментарии')
        )
      ))
    ),
    showCreate && h(CreatePostModal,{me,meUser,onClose:()=>setShowCreate(false)}),
    commentPost && h(CommentsModal,{post:commentPost,me,meUser,onClose:()=>setCommentPost(null)})
  );
}

function CreatePostModal({me,meUser,onClose}){
  const [text,setText]=useState('');
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const fileRef=useRef();

  const handlePost=async()=>{
    setBusy(true);
    try {
      let mediaUrl=null, mediaType=null;
      if(file){
        mediaUrl=await upload(file);
        mediaType=file.type.startsWith('video/')?'video':'image';
      }
      await db.ref('posts').push().set({uid:me,login:meUser?.login,avatarUrl:meUser?.avatarUrl,text,mediaUrl,mediaType,ts:Date.now()});
      onClose();
    } catch(e){alert(e.message)}
    setBusy(false);
  };

  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Новый пост'),h('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:24},onClick:onClose},'×')),
    h('textarea',{value:text,onChange:e=>setText(e.target.value),placeholder:'Что нового?',rows:4,style:{resize:'none',marginBottom:12}}),
    h('div',{style:{display:'flex',gap:8}},
      h('button',{className:'btn btn-ghost',onClick:()=>fileRef.current.click()},'🖼️ Выбрать файл'),
      h('button',{className:'btn btn-primary',style:{flex:1},onClick:handlePost,disabled:busy},busy?'Публикация...':'Опубликовать')
    ),
    h('input',{ref:fileRef,type:'file',style:{display:'none'},onChange:e=>setFile(e.target.files[0])})
  );
}

function CommentsModal({post,me,meUser,onClose}){
  const [comments,setComments]=useState([]);
  const [text,setText]=useState('');

  useEffect(()=>{
    const ref=db.ref(`posts/${post.k}/comments`);
    ref.on('value',s=>{
      const v=s.val()||{};
      setComments(Object.entries(v).map(([k,c])=>({k,...c})).sort((a,b)=>a.ts-b.ts));
    });
    return()=>ref.off();
  },[post.k]);

  const send=async()=>{
    if(!text.trim())return;
    await db.ref(`posts/${post.k}/comments`).push().set({uid:me,login:meUser?.login,avatarUrl:meUser?.avatarUrl,text,ts:Date.now()});
    setText('');
  };

  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Комментарии'),h('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:24},onClick:onClose},'×')),
    h('div',{style:{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,marginBottom:12}},
      comments.map(c=>h('div',{key:c.k,style:{background:'rgba(255,255,255,0.02)',padding:8,borderRadius:10}},
        h('div',{style:{fontWeight:700,fontSize:12}},c.login),
        h('div',{style:{fontSize:13,marginTop:2}},c.text)
      ))
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{placeholder:'Комментарий...',value:text,onChange:e=>setText(e.target.value)}),
      h('button',{className:'btn btn-primary',onClick:send},'→')
    )
  );
}

function PCSettingsTab(){
  return h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
    h('div',{style:{fontSize:13,color:'var(--muted)'}},'Десктопные настройки будут применены автоматически в приложении для Windows.'),
    h('button',{className:'btn btn-ghost',onClick:()=>window.open('https://drive.google.com/drive/folders/1PZMmCfQoKMAG5KSPaPqx8fXCGe9JwnCs?usp=sharing','_blank')},'📥 Скачать версию для ПК')
  );
}

function UserProfilePage({uid,me,onClose,onStartDM}){
  const [u,setU]=useState(null);
  useEffect(()=>{
    db.ref('users/'+uid).on('value',s=>setU(s.val()));
    return()=>db.ref('users/'+uid).off();
  },[uid]);

  return h('div',{style:{flex:1,background:'var(--bg)',padding:24,overflowY:'auto'}},
    h('button',{className:'btn btn-ghost',onClick:onClose,style:{marginBottom:16}},'← Назад'),
    h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:16,background:'var(--glass-bg)',padding:30,borderRadius:24,border:'1px solid var(--glass-border)',boxShadow:'var(--glass-shine)'}},
      h(Avatar,{user:u||{id:uid},size:90,ring:true}),
      h('div',{className:'syne',style:{fontSize:24,fontWeight:800}},u?.login||'Участник'),
      u?.bio&&h('div',{style:{textAlign:'center',color:'var(--muted)',fontSize:14,maxWidth:320,lineHeight:1.6}},u.bio),
      uid!==me&&u&&h('button',{className:'btn btn-primary',onClick:()=>onStartDM(u)},'💬 Начать диалог')
    )
  );
}

// ── App Container ────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [dmConvs,setDmConvs]=useState([]);
  const [rooms,setRooms]=useState([]);
  const [activeChat,setActiveChat]=useState(null);
  const [peerUsers,setPeerUsers]=useState({});
  const [showSearch,setShowSearch]=useState(false);
  const [showRoomSearch,setShowRoomSearch]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [createRoom,setCreateRoom]=useState(null);
  const [showMobileList,setShowMobileList]=useState(true);
  const [peerInst,setPeerInst]=useState(null);
  const [showRT,setShowRT]=useState(false);
  const [tab,setTab]=useState('dms');
  const [uid,setUid]=useState(null);
  const [showFeed,setShowFeed]=useState(false);
  const [viewProfile,setViewProfile]=useState(null);

  useEffect(()=>{
    const saved=localStorage.getItem('theme')||'dark';
    if(saved==='light')document.body.classList.add('light');
  },[]);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fu=>{
      if(fu){
        const ref=db.ref('users/'+fu.uid);
        await ref.update({online:true,lastSeen:Date.now()});
        ref.on('value',s=>{
          setUser(s.val());
          setUid(fu.uid);
          setLoading(false);
        });
      }else{
        setUser(null);
        setLoading(false);
      }
    });
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!uid)return;
    const p=new Peer('mx-'+uid.replace(/[^a-zA-Z0-9]/g,'-'),{debug:0});
    p.on('open',pid=>{
      setPeerInst(p);
      db.ref('users/'+uid).update({peerId:pid});
    });
    return()=>p.destroy();
  },[uid]);

  const loadUser=useCallback(u=>{
    db.ref('users/'+u).on('value',s=>{
      if(s.val())setPeerUsers(p=>({...p,[u]:s.val()}));
    });
  },[]);

  useEffect(()=>{
    if(!uid)return;
    db.ref('dm').on('value',s=>{
      const mine=Object.entries(s.val()||{}).filter(([k])=>k.includes(uid)).map(([k,v])=>{
        const other=k.split('__').find(p=>p!==uid);
        return {uid:other,last:v.last||null,unread:v.unread?.[uid]||0};
      });
      setDmConvs(mine);
      mine.forEach(c=>loadUser(c.uid));
    });
  },[uid,loadUser]);

  useEffect(()=>{
    if(!uid)return;
    db.ref('rooms').on('value',s=>{
      setRooms(Object.values(s.val()||{}).filter(r=>r?.members?.[uid]));
    });
  },[uid]);

  const openDM=u=>{
    setActiveChat({type:'dm',id:u.id});
    setShowFeed(false);setShowRT(false);setViewProfile(null);
  };
  const openRoom=r=>{
    setActiveChat({type:'room',id:r.id});
    setShowFeed(false);setShowRT(false);setViewProfile(null);
  };

  if(loading)return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--muted)'}},h('div',{style:{width:36,height:36,border:'3px solid rgba(47,128,237,0.2)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}));
  if(!user)return h(Auth);

  const activeDMPeer=activeChat?.type==='dm'?peerUsers[activeChat.id]:null;
  const activeRoom=activeChat?.type==='room'?rooms.find(r=>r.id===activeChat.id):null;

  const listContent=()=>{
    if(tab==='dms')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{width:'100%',justifyContent:'flex-start',marginBottom:10},onClick:()=>setShowSearch(true)},'🔍 Поиск собеседника'),
      dmConvs.map(c=>{
        const pu=peerUsers[c.uid];
        return h('div',{key:c.uid,className:'chat-row'+(activeChat?.id===c.uid?' active':''),onClick:()=>{openDM({id:c.uid});setShowMobileList(false)}},
          h(Avatar,{user:pu||{id:c.uid},size:38}),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:4}},pu?.login||c.uid.slice(0,6),pu?.email&&VERIFIED_EMAILS.includes(pu.email)&&h(OfficialBadge)),
            h('div',{style:{fontSize:12,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},c.last?.preview||'Кликните для диалога')
          )
        );
      })
    );
    if(tab==='groups')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{width:'100%',justifyContent:'flex-start',marginBottom:10},onClick:()=>setCreateRoom('group')},'＋ Создать группу'),
      rooms.filter(r=>r.type==='group').map(r=>h('div',{key:r.id,className:'chat-row'+(activeChat?.id===r.id?' active':''),onClick:()=>{openRoom(r);setShowMobileList(false)}},
        r.avatarUrl?h('img',{src:r.avatarUrl,style:{width:38,height:38,borderRadius:'50%'}}):h('div',{style:{width:38,height:38,borderRadius:'50%',background:'rgba(47,128,237,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'👥'),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14}},r.name),h('div',{style:{fontSize:12,color:'var(--muted)'}},r.desc||'Общение'))
      ))
    );
    if(tab==='channels')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{width:'100%',justifyContent:'flex-start',marginBottom:10},onClick:()=>setCreateRoom('channel')},'📢 Создать канал'),
      rooms.filter(r=>r.type==='channel').map(r=>h('div',{key:r.id,className:'chat-row'+(activeChat?.id===r.id?' active':''),onClick:()=>{openRoom(r);setShowMobileList(false)}},
        r.avatarUrl?h('img',{src:r.avatarUrl,style:{width:38,height:38,borderRadius:'50%'}}):h('div',{style:{width:38,height:38,borderRadius:'50%',background:'rgba(155,140,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'📢'),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14}},r.name),h('div',{style:{fontSize:12,color:'var(--muted)'}},r.desc||'Новости'))
      ))
    );
  };

  const navTabs=[{id:'dms',icon:'💬',label:'Чаты'},{id:'groups',icon:'👥',label:'Группы'},{id:'channels',icon:'📢',label:'Каналы'},{id:'feed',icon:'📸',label:'Лента'},{id:'rt',icon:'▶️',label:'Rutube'},{id:'profile',icon:'👤',label:'Профиль'}];

  return h('div',{className:'app-layout'},
    h('div',{className:'liquid-glass sidebar'},
      h('div',{style:{display:'flex',alignItems:'center',gap:12,cursor:'pointer'},onClick:()=>setShowProfile(true)},
        h(Avatar,{user,size:38,ring:true}),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:700,fontSize:14}},user.login),h('div',{style:{fontSize:11,color:'var(--muted)'}},'Настройки'))
      ),
      h('div',{className:'tab-bar'},
        [{id:'dms',label:'Чаты'},{id:'groups',label:'Группы'},{id:'channels',label:'Каналы'}].map(t=>h('div',{key:t.id,className:'tab'+(tab===t.id?' active':''),onClick:()=>{setTab(t.id);setShowFeed(false);setShowRT(false);setActiveChat(null);setViewProfile(null);}},t.label))
      ),
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}},listContent()),
      h('button',{className:'btn btn-ghost',onClick:()=>{setShowFeed(true);setShowRT(false);setActiveChat(null);setViewProfile(null)}},'📸 Лента постов'),
      h('button',{className:'btn btn-ghost',onClick:()=>{setShowRT(true);setShowFeed(false);setActiveChat(null);setViewProfile(null)}},'▶️ Rutube / YT'),
      h('button',{className:'btn btn-danger',onClick:()=>auth.signOut()},'Выйти')
    ),

    showMobileList && !activeChat && !showFeed && !showRT && !viewProfile && h('div',{className:'mobile-list-overlay'},
      h('div',{className:'mobile-list-header chat-header',style:{padding:16,display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--glass-bg)',backdropFilter:'blur(20px)'}},
        h('div',{className:'syne',style:{fontSize:24,fontWeight:800}},tab==='dms'?'Сообщения':tab==='groups'?'Группы':'Каналы'),
        tab==='dms'&&h('button',{className:'btn btn-ghost btn-icon',onClick:()=>setShowSearch(true)},'＋')
      ),
      h('div',{style:{padding:12,display:'flex',flexDirection:'column',gap:4}},listContent())
    ),

    h('div',{className:'main-area'},
      viewProfile
        ?h(UserProfilePage,{uid:viewProfile,me:user.id,onClose:()=>setViewProfile(null),onStartDM:openDM})
        :showRT
          ?h('div',{className:'liquid-glass',style:{flex:1,height:'100%',display:'flex',flexDirection:'column',borderRadius:24,overflow:'hidden'}},
              h(RutubeTab,{me:user.id,dmConvs,peerUsers,rooms})
            )
          :showFeed
            ?h('div',{className:'liquid-glass',style:{flex:1,height:'100%',display:'flex',flexDirection:'column',borderRadius:24,overflow:'hidden'}},
                h(FeedTab,{me:user.id,meUser:user,onOpenProfile:openUserProfile})
              )
            :activeChat?.type==='dm'
              ?h(DMChat,{key:activeChat.id,me:user.id,peer:activeChat.id,peerUser:activeDMPeer,onBack:()=>{setActiveChat(null);setShowMobileList(true)},peerInst})
              :activeChat?.type==='room'&&activeRoom
                ?h(RoomChat,{key:activeRoom.id,room:activeRoom,me:user.id,onBack:()=>{setActiveChat(null);setShowMobileList(true)},onOpenProfile:openUserProfile})
                :h('div',{className:'liquid-glass',style:{flex:1,height:'100%',borderRadius:24,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}},
                    h('div',{style:{fontSize:48,opacity:0.15}},'💬'),
                    h('div',{className:'syne',style:{fontSize:24,fontWeight:800,opacity:0.2}},'Maxify iOS 26'),
                    h('div',{style:{fontSize:13,color:'var(--muted)',opacity:0.5}},'Выберите диалог или воспользуйтесь боковым меню')
                  )
    ),

    h('div',{className:'mobile-nav'},
      navTabs.map(t=>h('div',{key:t.id,className:'mobile-nav-btn'+((t.id==='profile'?showProfile:t.id==='rt'?showRT:t.id==='feed'?showFeed:tab===t.id&&!activeChat&&!showFeed&&!showRT)?' active':''),onClick:()=>{
        if(t.id==='profile'){setShowProfile(true);return}
        if(t.id==='rt'){setShowRT(true);setShowFeed(false);setActiveChat(null);setShowMobileList(false);return}
        if(t.id==='feed'){setShowFeed(true);setShowRT(false);setActiveChat(null);setShowMobileList(false);return}
        setShowProfile(false);setShowRT(false);setShowFeed(false);setTab(t.id);setActiveChat(null);setShowMobileList(true);
      }},
        h('div',{style:{fontSize:22}},t.icon),
        h('div',{style:{fontSize:10,fontWeight:600}},t.label)
      ))
    ),

    showProfile&&h(ProfileModal,{user,onClose:()=>setShowProfile(false)}),
    showSearch&&h(UserSearch,{me:user.id,onSelect:u=>{openDM(u);setShowMobileList(false)},onOpenProfile:openUserProfile,onClose:()=>setShowSearch(false)}),
    showRoomSearch&&h(RoomSearchModal,{me:user.id,onSelect:r=>{openRoom(r);setShowMobileList(false)},onClose:()=>setShowRoomSearch(false)}),
    createRoom&&h(CreateRoomModal,{me:user.id,type:createRoom,onClose:()=>setCreateRoom(null)})
  );
}

const openUserProfile=uid=>setViewProfile(uid);

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
});
</script>
</body>
</html>
