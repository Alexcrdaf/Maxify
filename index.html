<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxify</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--panel:rgba(255,255,255,.035);--border:rgba(255,255,255,.07);
  --accent:#4f8cff;--glow:rgba(79,140,255,.2);--text:#dde1f0;
  --muted:rgba(221,225,240,.35);--danger:#f87171;--ok:#34d399;
  --input-bg:rgba(255,255,255,.05);--bubble-mine:rgba(79,140,255,.18);
  --bubble-mine-border:rgba(79,140,255,.3);--bubble-their:rgba(255,255,255,.06);
  --bubble-their-border:rgba(255,255,255,.09);--attach-bg:rgba(13,15,26,.98);
  --nav-bg:rgba(10,12,22,.97);--bg-grad1:rgba(79,140,255,.06);--bg-grad2:rgba(155,140,255,.05);
  --pinned-bg:rgba(79,140,255,.06);--reply-bg:rgba(79,140,255,.08);
  --reaction-bg:rgba(255,255,255,.07);--reaction-mine:rgba(79,140,255,.2);
  --nav-h:62px;
}
body.light{
  --bg:#f0f2f8;--panel:rgba(255,255,255,.75);--border:rgba(0,0,0,.09);
  --accent:#2563eb;--glow:rgba(37,99,235,.15);--text:#1a1d2e;
  --muted:rgba(26,29,46,.45);--danger:#dc2626;--ok:#16a34a;
  --input-bg:rgba(0,0,0,.04);--bubble-mine:rgba(37,99,235,.12);
  --bubble-mine-border:rgba(37,99,235,.25);--bubble-their:rgba(0,0,0,.05);
  --bubble-their-border:rgba(0,0,0,.08);--attach-bg:#fff;
  --nav-bg:rgba(240,242,248,.97);--bg-grad1:rgba(37,99,235,.04);--bg-grad2:rgba(99,37,235,.03);
  --pinned-bg:rgba(37,99,235,.06);--reply-bg:rgba(37,99,235,.08);
  --reaction-bg:rgba(0,0,0,.06);--reaction-mine:rgba(37,99,235,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;transition:background .25s,color .25s;
  background-image:radial-gradient(ellipse 60% 40% at 75% 5%,var(--bg-grad1) 0%,transparent 70%),
  radial-gradient(ellipse 50% 40% at 5% 90%,var(--bg-grad2) 0%,transparent 70%)}
.syne{font-family:'Syne',sans-serif}
.glass{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
input,textarea,select{background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;transition:border .18s,box-shadow .18s;width:100%}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.btn{border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;border-radius:12px;padding:10px 18px;font-size:13px;transition:all .18s;letter-spacing:.02em;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#6fa4ff;transform:translateY(-1px);box-shadow:0 6px 24px var(--glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.2)}.btn-danger:hover{background:rgba(248,113,113,.22)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:10px;font-size:16px}
.bubble-mine{background:var(--bubble-mine);border:1px solid var(--bubble-mine-border);border-radius:16px 4px 16px 16px}
.bubble-their{background:var(--bubble-their);border:1px solid var(--bubble-their-border);border-radius:4px 16px 16px 16px}
.msg-in{animation:msgIn .22s cubic-bezier(.34,1.56,.64,1) both}
@keyframes msgIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:none}}
.chat-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:14px;cursor:pointer;transition:background .15s}
.chat-row:hover{background:rgba(255,255,255,.05)}.chat-row.active{background:rgba(79,140,255,.1);box-shadow:inset 2px 0 0 var(--accent)}
.dot-on{width:9px;height:9px;border-radius:50%;background:var(--ok);border:2px solid var(--bg);position:absolute;bottom:1px;right:1px;animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}50%{box-shadow:0 0 0 4px rgba(52,211,153,0)}}
.call-wrap{position:fixed;inset:0;background:rgba(5,7,15,.93);backdrop-filter:blur(28px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,.6)}50%{box-shadow:0 0 0 18px rgba(79,140,255,0)}}
.ring-anim{animation:ring 1.4s ease-in-out infinite;border-radius:50%}
@keyframes pulsered{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.6)}50%{box-shadow:0 0 0 14px rgba(248,113,113,0)}}
.pulse-red{animation:pulsered 1.2s ease-in-out infinite}
.hr{width:100%;height:1px;background:var(--border)}
.slide{animation:slide .24s cubic-bezier(.25,1,.5,1) both}
@keyframes slide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{border-radius:24px;padding:28px;width:380px;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.search-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;cursor:pointer;transition:background .15s}
.search-item:hover{background:rgba(79,140,255,.1)}
.unread{background:var(--accent);color:#fff;border-radius:999px;min-width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.d1{animation:blink 1.2s 0s infinite}.d2{animation:blink 1.2s .2s infinite}.d3{animation:blink 1.2s .4s infinite}
.attach-menu{position:absolute;bottom:54px;left:0;background:var(--attach-bg);border:1px solid var(--border);border-radius:16px;padding:8px;display:flex;flex-direction:column;gap:2px;min-width:200px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.attach-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;transition:background .12s}
.attach-item:hover{background:rgba(79,140,255,.12)}
.voice-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:999px}
.voice-wave{display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:3px;border-radius:2px;background:var(--danger);animation:wave 1s ease-in-out infinite}
.voice-wave span:nth-child(1){height:6px;animation-delay:0s}.voice-wave span:nth-child(2){height:14px;animation-delay:.1s}.voice-wave span:nth-child(3){height:10px;animation-delay:.2s}.voice-wave span:nth-child(4){height:18px;animation-delay:.3s}.voice-wave span:nth-child(5){height:8px;animation-delay:.4s}.voice-wave span:nth-child(6){height:12px;animation-delay:.15s}.voice-wave span:nth-child(7){height:16px;animation-delay:.25s}
@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
audio{width:180px;height:34px}
.img-msg img{max-width:250px;max-height:190px;border-radius:14px;object-fit:cover;cursor:pointer;transition:transform .18s;display:block}
.img-msg img:hover{transform:scale(1.02)}
.vnote{width:158px;height:158px;border-radius:50%;object-fit:cover;border:2.5px solid var(--accent);background:#000;display:block}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:12px;object-fit:contain}
.prog-bar{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--accent);transition:width .2s;border-radius:2px}
@keyframes sendPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.send-pop{animation:sendPop .18s ease}
.avatar-img{border-radius:50%;object-fit:cover;display:block}
.tab-bar{display:flex;gap:4px;padding:4px}
.tab{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;color:var(--muted);font-family:'Syne',sans-serif}
.tab.active{background:rgba(79,140,255,.15);color:var(--accent)}
.tab:hover:not(.active){background:rgba(255,255,255,.05);color:var(--text)}

/* ── PINNED MESSAGE BAR ── */
.pinned-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--pinned-bg);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;flex-shrink:0}
.pinned-bar:hover{background:rgba(79,140,255,.1)}
.pinned-line{width:3px;height:32px;border-radius:2px;background:var(--accent);flex-shrink:0}
.pinned-content{flex:1;min-width:0}
.pinned-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:1px}
.pinned-text{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── REPLY BAR ── */
.reply-bar{padding:8px 14px;background:var(--reply-bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.reply-preview{flex:1;min-width:0}
.reply-to-name{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:2px}
.reply-to-text{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-bubble{background:var(--reply-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:5px 10px;margin-bottom:6px;cursor:pointer}
.reply-sender{font-size:11px;color:var(--accent);font-weight:700}
.reply-msg{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}

/* ── REACTIONS ── */
.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;background:var(--reaction-bg);border:1px solid var(--border);cursor:pointer;font-size:12px;transition:all .15s;user-select:none}
.reaction-chip:hover{background:rgba(79,140,255,.15);border-color:var(--accent);transform:scale(1.08)}
.reaction-chip.mine{background:var(--reaction-mine);border-color:var(--accent)}
.reaction-chip .count{font-size:11px;font-weight:700;color:var(--text)}
.emoji-picker{position:absolute;background:var(--attach-bg);border:1px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-wrap:wrap;gap:4px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);width:200px}
.emoji-btn{font-size:20px;cursor:pointer;padding:4px;border-radius:8px;transition:transform .12s,background .12s;border:none;background:none}
.emoji-btn:hover{transform:scale(1.3);background:rgba(255,255,255,.08)}

/* ── MESSAGE CONTEXT MENU ── */
.msg-menu{position:absolute;background:var(--attach-bg);border:1px solid var(--border);border-radius:14px;padding:6px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:170px}
.msg-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;transition:background .12s}
.msg-menu-item:hover{background:rgba(79,140,255,.12)}
.msg-menu-item.danger{color:var(--danger)}.msg-menu-item.danger:hover{background:rgba(248,113,113,.12)}

/* ── ONLINE STATUS INDICATOR ── */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.online{background:var(--ok)}
.status-dot.offline{background:rgba(255,255,255,.2)}
.status-dot.recently{background:#fbbf24}

/* ── SWIPE TO REPLY ── */
.msg-wrapper{position:relative;transition:transform .2s cubic-bezier(.25,1,.5,1)}

/* ── ADMIN BADGE ── */
.admin-badge{font-size:9px;padding:1px 6px;border-radius:999px;background:rgba(251,191,36,.15);color:#fbbf24;font-weight:700;border:1px solid rgba(251,191,36,.25)}

@media(max-width:640px){
  body{overflow:hidden}
  html,body,#root{height:100%;height:100dvh}
  .sidebar{display:none!important}
  .app-layout{flex-direction:column!important;padding:0!important;gap:0!important;height:100dvh!important;}
  .main-area{flex:1!important;min-height:0!important;border-radius:0!important;overflow:hidden!important;margin-bottom:var(--nav-h)!important;}
  .chat-header{padding:10px 14px!important;padding-top:max(10px,env(safe-area-inset-top))!important;}
  .msgs-area{padding:10px 12px!important;}
  .input-wrap{padding:8px 10px!important;padding-bottom:calc(8px + env(safe-area-inset-bottom))!important;}
  .attach-menu{bottom:52px!important;left:8px!important;}
  .mobile-nav{display:flex!important;position:fixed!important;bottom:0;left:0;right:0;height:var(--nav-h)!important;padding-bottom:env(safe-area-inset-bottom)!important;background:var(--nav-bg)!important;backdrop-filter:blur(20px)!important;border-top:1px solid var(--border)!important;z-index:200!important;align-items:center!important;justify-content:space-around!important;}
  .mobile-nav-btn{display:flex!important;flex-direction:column!important;align-items:center!important;gap:3px!important;padding:6px 16px!important;border-radius:14px!important;cursor:pointer!important;color:var(--muted)!important;transition:color .15s,background .15s!important;-webkit-tap-highlight-color:transparent!important;}
  .mobile-nav-btn.active{color:var(--accent)!important}
  .mobile-nav-btn .nav-icon{font-size:24px;line-height:1}
  .mobile-nav-btn .nav-label{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.03em}
  .mobile-list-overlay{display:flex!important;position:fixed!important;inset:0!important;bottom:var(--nav-h)!important;background:var(--bg)!important;z-index:90!important;overflow-y:auto!important;flex-direction:column!important;}
  .mobile-list-header{display:flex!important;align-items:center!important;justify-content:space-between!important;padding:16px 16px 8px!important;padding-top:max(16px,env(safe-area-inset-top))!important;position:sticky!important;top:0!important;background:var(--bg)!important;z-index:2!important;border-bottom:1px solid var(--border)!important;}
  .mobile-list-body{padding:8px 12px!important;}
  .modal-bg{align-items:flex-end!important}
  .modal{width:100%!important;max-height:92dvh!important;overflow-y:auto!important;border-radius:24px 24px 0 0!important;padding-bottom:calc(24px + env(safe-area-inset-bottom))!important;}
  .call-wrap{padding:20px!important}
  .btn-icon{width:42px!important;height:42px!important}
  .chat-row{padding:10px 12px!important;min-height:64px}
  .bubble-mine,.bubble-their{font-size:15px!important;padding:10px 15px!important}
  .input-wrap input{font-size:16px!important}
  .img-msg img{max-width:200px!important;max-height:160px!important}
  .vnote{width:130px!important;height:130px!important}
  .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding:4px 2px}
  .tab{white-space:nowrap;flex-shrink:0}
  .msg-menu{right:0!important;left:auto!important}
  .emoji-picker{right:0!important;left:auto!important}
  audio{width:150px!important}
}
@media(min-width:641px){
  .mobile-nav{display:none!important}
  .mobile-list-overlay{display:none!important}
}
@media(min-width:641px) and (max-width:1024px){
  .sidebar{width:220px!important}
  .app-layout{padding:8px!important;gap:8px!important}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .18s ease both}
</style>
</head>

<script>
// ── SECURITY: DevTools detection ─────────────────────────────────────────────
(function(){
  'use strict';
  let _blocked = false;
  let _dtOpen = false;
  let _warnCount = 0;

  // Overlay element shown when devtools detected
  function showBlock(){
    if(_blocked) return;
    _blocked = true;
    const el = document.createElement('div');
    el.id = '__sec_overlay';
    el.style.cssText = [
      'position:fixed','inset:0','z-index:999999',
      'background:#07090f','display:flex','flex-direction:column',
      'align-items:center','justify-content:center','gap:16px',
      'font-family:Syne,sans-serif'
    ].join(';');
    el.innerHTML = `
      <div style="font-size:48px">🔒</div>
      <div style="color:#dde1f0;font-size:22px;font-weight:800;letter-spacing:-.03em">Доступ заблокирован</div>
      <div style="color:rgba(221,225,240,.45);font-size:14px;text-align:center;max-width:340px;line-height:1.7">
        Инструменты разработчика не допускаются.<br>
        Закройте DevTools и обновите страницу.
      </div>
      <button onclick="location.reload()" style="margin-top:8px;background:#4f8cff;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-family:Syne,sans-serif;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.02em">
        Обновить страницу
      </button>`;
    document.body.appendChild(el);
    // Freeze React root
    const root = document.getElementById('root');
    if(root) root.style.display = 'none';
  }

  function hideBlock(){
    _blocked = false;
    _dtOpen = false;
    _warnCount = 0;
    const el = document.getElementById('__sec_overlay');
    if(el) el.remove();
    const root = document.getElementById('root');
    if(root) root.style.display = '';
  }

  // Detection: debugger timing (accurate — pauses only when DevTools open with "Pause on debugger" active)
  // + firebug/devtools object check (works in Chrome/Firefox/Edge)
  function isDevToolsOpen(){
    // Check 1: debugger timing — only triggers if DevTools is open AND paused
    const t0 = performance.now();
    debugger;
    const t1 = performance.now();
    if((t1 - t0) > 150) return true;

    // Check 2: Chrome-specific devtools object
    if(window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) return true;

    // Check 3: outerHeight/innerHeight only with very large threshold to avoid false positives
    // (taskbar, browser chrome etc typically add <100px; devtools adds 200-400px)
    const heightDiff = window.outerHeight - window.innerHeight;
    if(heightDiff > 300) return true;

    return false;
  }

  // Poll every 1200ms
  setInterval(function(){
    if(isDevToolsOpen()){
      if(!_dtOpen){
        _dtOpen = true;
        showBlock();
      }
    } else {
      if(_dtOpen && _blocked){
        hideBlock();
      }
    }
  }, 1200);

  // Disable right-click context menu
  document.addEventListener('contextmenu', function(e){
    e.preventDefault();
    return false;
  });

  // Disable common devtools keyboard shortcuts
  document.addEventListener('keydown', function(e){
    // F12
    if(e.key === 'F12') { e.preventDefault(); return false; }
    // Ctrl+Shift+I / Cmd+Option+I
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (e.key==='I'||e.key==='i')) { e.preventDefault(); return false; }
    // Ctrl+Shift+J
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (e.key==='J'||e.key==='j')) { e.preventDefault(); return false; }
    // Ctrl+Shift+C
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (e.key==='C'||e.key==='c')) { e.preventDefault(); return false; }
    // Ctrl+U (view source)
    if((e.ctrlKey||e.metaKey) && (e.key==='U'||e.key==='u')) { e.preventDefault(); return false; }
    // Ctrl+S (save page)
    if((e.ctrlKey||e.metaKey) && (e.key==='S'||e.key==='s')) { e.preventDefault(); return false; }
  });

  // Override console to neutralize injection attempts
  const _noop = ()=>{};
  const _safeConsole = {
    log: _noop, warn: _noop, error: _noop, info: _noop,
    debug: _noop, table: _noop, dir: _noop, group: _noop,
    groupEnd: _noop, time: _noop, timeEnd: _noop, trace: _noop,
    assert: _noop, clear: _noop, count: _noop, countReset: _noop
  };
  // Freeze the overrides so they can't be re-assigned from console
  try {
    Object.keys(_safeConsole).forEach(k => {
      try { window.console[k] = _noop; } catch(e2){}
    });
  } catch(e) {}

  // Detect if page is inside iframe (clickjacking protection)

// ── Message Bubble (enhanced) ──

    ),
    h('div',{
      style:{position:'relative',display:'inline-block',maxWidth:'100%'},

      onDoubleClick:e=>{e.preventDefault();setShowMenu(true)}
    },
      content(),
      showMenu&&h('div',{ref:menuRef,className:'msg-menu fade-in',style:{position:'absolute',bottom:'calc(100% + 4px)',[mine?'right':'left']:0}},
        h('div',{className:'msg-menu-item',onClick:()=>{setShowEmoji(true);setShowMenu(false)}},'😊  Реакция'),
        h('div',{className:'msg-menu-item',onClick:()=>{onReply&&onReply(m);setShowMenu(false)}},'↩️  Ответить'),
        canPin&&h('div',{className:'msg-menu-item',onClick:()=>{onPin&&onPin(m);setShowMenu(false)}},'📌  Закрепить'),
        mine&&m.type==='text'&&h('div',{className:'msg-menu-item',onClick:()=>{onEdit&&onEdit(m);setShowMenu(false)}},'✏️  Редактировать'),
        mine&&h('div',{className:'msg-menu-item danger',onClick:()=>{onDelete&&onDelete(m);setShowMenu(false)}},'🗑️  Удалить')
