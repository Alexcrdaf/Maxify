<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Maxify</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --accent:#4f8cff;
  --glow:rgba(79,140,255,0.25);
  --text:#e4e7f5;
  --muted:rgba(228,231,245,0.4);
  --danger:#f87171;
  --ok:#34d399;
  --input-bg:rgba(255,255,255,0.06);
  --bubble-mine:rgba(79,140,255,0.2);
  --bubble-mine-border:rgba(79,140,255,0.35);
  --bubble-their:rgba(255,255,255,0.08);
  --bubble-their-border:rgba(255,255,255,0.12);
  --attach-bg:rgba(13,15,26,0.98);
  --nav-bg:rgba(10,12,22,0.98);
  --bg-grad1:rgba(79,140,255,0.08);
  --bg-grad2:rgba(155,140,255,0.06);
  --pinned-bg:rgba(79,140,255,0.08);
  --reply-bg:rgba(79,140,255,0.1);
  --reaction-bg:rgba(255,255,255,0.08);
  --reaction-mine:rgba(79,140,255,0.25);
  --nav-h:64px;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
  --shadow-md:0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.6);
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:24px;
}
body.light{
  --bg:#f3f4f8;
  --panel:rgba(255,255,255,0.8);
  --border:rgba(0,0,0,0.1);
  --accent:#2563eb;
  --glow:rgba(37,99,235,0.2);
  --text:#1a1d2e;
  --muted:rgba(26,29,46,0.5);
  --danger:#dc2626;
  --ok:#16a34a;
  --input-bg:rgba(0,0,0,0.05);
  --bubble-mine:rgba(37,99,235,0.15);
  --bubble-mine-border:rgba(37,99,235,0.3);
  --bubble-their:rgba(0,0,0,0.06);
  --bubble-their-border:rgba(0,0,0,0.1);
  --attach-bg:#ffffff;
  --nav-bg:rgba(243,244,248,0.98);
  --bg-grad1:rgba(37,99,235,0.05);
  --bg-grad2:rgba(99,37,235,0.04);
  --pinned-bg:rgba(37,99,235,0.08);
  --reply-bg:rgba(37,99,235,0.1);
  --reaction-bg:rgba(0,0,0,0.08);
  --reaction-mine:rgba(37,99,235,0.2);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100vh;
  overflow:hidden;
  transition:background .3s,color .3s;
  background-image:
    radial-gradient(ellipse 60% 40% at 75% 5%,var(--bg-grad1) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 5% 90%,var(--bg-grad2) 0%,transparent 70%);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.syne{font-family:'Syne',sans-serif}
.glass{
  background:var(--panel);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
input,textarea,select{
  background:var(--input-bg);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:12px;
  padding:10px 14px;
  outline:none;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  transition:all .2s ease;
  width:100%;
}
input:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--glow);
}
input::placeholder,textarea::placeholder{color:var(--muted)}
.btn{
  border:none;
  cursor:pointer;
  font-family:'Syne',sans-serif;
  font-weight:700;
  border-radius:12px;
  padding:10px 18px;
  font-size:13px;
  transition:all .25s cubic-bezier(.25,1,.5,1);
  letter-spacing:.02em;
  display:inline-flex;
  align-items:center;
  gap:6px;
  position:relative;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0);
  transition:background .3s ease;
  border-radius:inherit;
  pointer-events:none;
}
.btn:active::after{background:rgba(255,255,255,0.1)}
.btn-primary{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 16px var(--glow);
}
.btn-primary:hover{
  background:#6fa4ff;
  transform:translateY(-2px);
  box-shadow:0 8px 28px var(--glow);
}
.btn-primary:active{
  transform:translateY(0);
  box-shadow:0 4px 16px var(--glow);
}
.btn-primary:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none;
}
.btn-ghost{
  background:rgba(255,255,255,0.06);
  color:var(--text);
}
.btn-ghost:hover{
  background:rgba(255,255,255,0.12);
  transform:translateY(-1px);
}
.btn-ghost:active{transform:translateY(0)}
.btn-danger{
  background:rgba(248,113,113,0.12);
  color:var(--danger);
  border:1px solid rgba(248,113,113,0.2);
}
.btn-danger:hover{
  background:rgba(248,113,113,0.22);
  transform:translateY(-1px);
}
.btn-danger:active{transform:translateY(0)}
.btn-icon{
  width:38px;
  height:38px;
  padding:0;
  justify-content:center;
  border-radius:12px;
  font-size:16px;
  transition:all .25s cubic-bezier(.25,1,.5,1);
}
.btn-icon:hover{transform:scale(1.08)}
.btn-icon:active{transform:scale(0.95)}
.bubble-mine{
  background:var(--bubble-mine);
  border:1px solid var(--bubble-mine-border);
  border-radius:16px 4px 16px 16px;
}
.bubble-their{
  background:var(--bubble-their);
  border:1px solid var(--bubble-their-border);
  border-radius:4px 16px 16px 16px;
}
.msg-in{animation:msgIn .25s cubic-bezier(.34,1.56,.64,1) both}
@keyframes msgIn{
  from{opacity:0;transform:scale(.88) translateY(10px)}
  to{opacity:1;transform:none}
}
.chat-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  cursor:pointer;
  transition:all .2s ease;
  position:relative;
}
.chat-row:hover{
  background:rgba(255,255,255,0.06);
  transform:translateX(2px);
}
.chat-row.active{
  background:rgba(79,140,255,0.12);
  box-shadow:inset 3px 0 0 var(--accent);
}
.chat-row:active{transform:scale(0.98)}
.dot-on{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--ok);
  border:2px solid var(--bg);
  position:absolute;
  bottom:2px;
  right:2px;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0.4)}
  50%{box-shadow:0 0 0 5px rgba(52,211,153,0)}
}
.call-wrap{
  position:fixed;
  inset:0;
  background:rgba(5,7,15,0.95);
  backdrop-filter:blur(32px);
  z-index:300;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}
@keyframes ring{
  0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,0.6)}
  50%{box-shadow:0 0 0 20px rgba(79,140,255,0)}
}
.ring-anim{animation:ring 1.4s ease-in-out infinite;border-radius:50%}
@keyframes pulsered{
  0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.6)}
  50%{box-shadow:0 0 0 16px rgba(248,113,113,0)}
}
.pulse-red{animation:pulsered 1.2s ease-in-out infinite}
.hr{width:100%;height:1px;background:var(--border);margin:4px 0}
.slide{animation:slide .25s cubic-bezier(.25,1,.5,1) both}
@keyframes slide{
  from{opacity:0;transform:translateX(16px)}
  to{opacity:1;transform:none}
}
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:fadeIn .2s ease both;
}
.modal{
  border-radius:28px;
  padding:28px;
  width:400px;
  max-width:92vw;
  display:flex;
  flex-direction:column;
  gap:14px;
  box-shadow:var(--shadow-lg);
  animation:scaleIn .3s ease both;
}
.search-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border-radius:14px;
  cursor:pointer;
  transition:all .2s ease;
}
.search-item:hover{
  background:rgba(79,140,255,0.12);
  transform:translateX(2px);
}
.search-item:active{transform:scale(0.98)}
.unread{
  background:var(--accent);
  color:#fff;
  border-radius:999px;
  min-width:20px;
  height:20px;
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 6px;
  box-shadow:0 2px 8px var(--glow);
}
@keyframes blink{
  0%,80%,100%{opacity:.2}
  40%{opacity:1}
}
.d1{animation:blink 1.2s 0s infinite}
.d2{animation:blink 1.2s .2s infinite}
.d3{animation:blink 1.2s .4s infinite}
.emoji-picker{
  position:absolute;
  background:var(--attach-bg);
  border:1px solid var(--border);
  border-radius:16px;
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  z-index:200;
  box-shadow:var(--shadow-md);
  width:210px;
}
.emoji-btn{
  font-size:20px;
  cursor:pointer;
  padding:6px;
  border-radius:10px;
  transition:all .15s ease;
  border:none;
  background:none;
}
.emoji-btn:hover{
  transform:scale(1.3);
  background:rgba(255,255,255,0.1);
}
.msg-menu{
  position:absolute;
  background:var(--attach-bg);
  border:1px solid var(--border);
  border-radius:16px;
  padding:6px;
  z-index:300;
  box-shadow:var(--shadow-md);
  min-width:180px;
  animation:scaleIn .15s ease both;
}
.msg-menu-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  transition:all .15s ease;
}
.msg-menu-item:hover{background:rgba(79,140,255,0.12)}
.msg-menu-item.danger{color:var(--danger)}
.msg-menu-item.danger:hover{background:rgba(248,113,113,0.12)}
.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  display:inline-block;
  flex-shrink:0;
}
.status-dot.online{background:var(--ok)}
.status-dot.offline{background:rgba(255,255,255,0.2)}
.status-dot.recently{background:#fbbf24}
.avatar-img{
  border-radius:50%;
  object-fit:cover;
  display:block;
  transition:transform .2s ease;
}
.avatar-img:hover{transform:scale(1.05)}
.tab-bar{display:flex;gap:4px;padding:4px}
.tab{
  padding:8px 16px;
  border-radius:12px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  color:var(--muted);
  font-family:'Syne',sans-serif;
}
.tab.active{
  background:rgba(79,140,255,0.15);
  color:var(--accent);
  box-shadow:0 2px 8px var(--glow);
}
.tab:hover:not(.active){
  background:rgba(255,255,255,0.06);
  color:var(--text);
  transform:translateY(-1px);
}
.tab:active{transform:translateY(0);scale:0.97}
.pinned-bar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  background:var(--pinned-bg);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:all .2s ease;
  flex-shrink:0;
}
.pinned-bar:hover{background:rgba(79,140,255,0.12)}
.pinned-line{
  width:3px;
  height:32px;
  border-radius:2px;
  background:var(--accent);
  flex-shrink:0;
}
.pinned-content{flex:1;min-width:0}
.pinned-label{
  font-size:10px;
  color:var(--accent);
  font-weight:700;
  letter-spacing:.06em;
  margin-bottom:2px;
}
.pinned-text{
  font-size:12px;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.reply-bar{
  padding:8px 16px;
  background:var(--reply-bg);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}
.reply-preview{flex:1;min-width:0}
.reply-to-name{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:2px}
.reply-to-text{
  font-size:12px;
  color:var(--muted);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.reply-bubble{
  background:var(--reply-bg);
  border-left:4px solid var(--accent);
  border-radius:0 10px 10px 0;
  padding:6px 12px;
  margin-bottom:6px;
  cursor:pointer;
  transition:all .15s ease;
}
.reply-bubble:hover{background:rgba(79,140,255,0.15)}
.reply-sender{font-size:11px;color:var(--accent);font-weight:700}
.reply-msg{
  font-size:12px;
  color:var(--muted);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:220px;
}
.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-chip{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:3px 8px;
  border-radius:999px;
  background:var(--reaction-bg);
  border:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
  transition:all .2s ease;
  user-select:none;
}
.reaction-chip:hover{
  background:rgba(79,140,255,0.18);
  border-color:var(--accent);
  transform:scale(1.1);
}
.reaction-chip:active{transform:scale(1.05)}
.reaction-chip.mine{
  background:var(--reaction-mine);
  border-color:var(--accent);
}
.reaction-chip .count{font-size:11px;font-weight:700;color:var(--text)}
.admin-badge{
  font-size:9px;
  padding:2px 7px;
  border-radius:999px;
  background:rgba(251,191,36,0.15);
  color:#fbbf24;
  font-weight:700;
  border:1px solid rgba(251,191,36,0.25);
}
.prog-bar{height:3px;background:var(--border);flex-shrink:0;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width .3s ease;border-radius:2px}
@keyframes sendPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}
.send-pop{animation:sendPop .2s ease}
.voice-bar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 14px;
  background:rgba(248,113,113,0.08);
  border:1px solid rgba(248,113,113,0.2);
  border-radius:999px;
}
.voice-wave{
  display:flex;
  align-items:center;
  gap:2px;
  height:20px;
}
.voice-wave span{
  width:3px;
  border-radius:2px;
  background:var(--danger);
  animation:wave 1s ease-in-out infinite;
}
.voice-wave span:nth-child(1){height:6px;animation-delay:0s}
.voice-wave span:nth-child(2){height:14px;animation-delay:.1s}
.voice-wave span:nth-child(3){height:10px;animation-delay:.2s}
.voice-wave span:nth-child(4){height:18px;animation-delay:.3s}
.voice-wave span:nth-child(5){height:8px;animation-delay:.4s}
.voice-wave span:nth-child(6){height:12px;animation-delay:.15s}
.voice-wave span:nth-child(7){height:16px;animation-delay:.25s}
@keyframes wave{
  0%,100%{transform:scaleY(.4)}
  50%{transform:scaleY(1)}
}
audio{width:180px;height:34px}
.img-msg img{
  max-width:280px;
  max-height:200px;
  border-radius:14px;
  object-fit:cover;
  cursor:pointer;
  transition:all .2s ease;
  display:block;
}
.img-msg img:hover{transform:scale(1.03);box-shadow:var(--shadow-md)}
.vnote{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid var(--accent);
  background:#000;
  display:block;
  box-shadow:0 0 24px var(--glow);
}
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:zoom-out;
  animation:fadeIn .2s ease both;
}
.lightbox img{
  max-width:92vw;
  max-height:92vh;
  border-radius:16px;
  object-fit:contain;
  box-shadow:var(--shadow-lg);
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.92)}
  to{opacity:1;transform:scale(1)}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:none}
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.6}
}
.fade-in{animation:fadeIn .2s ease both}
.scale-in{animation:scaleIn .25s ease both}
.slide-up{animation:slideUp .3s ease both}

/* ── FEED IMPROVEMENTS ── */
.feed-post{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
  transition:all .25s ease;
  box-shadow:var(--shadow-sm);
}
.feed-post:hover{
  box-shadow:var(--shadow-md);
  transform:translateY(-2px);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  cursor:pointer;
}
.post-header:hover{background:rgba(255,255,255,0.02)}
.post-image{
  width:100%;
  max-height:500px;
  object-fit:cover;
  display:block;
  cursor:zoom-in;
  transition:all .2s ease;
}
.post-video{
  width:100%;
  max-height:500px;
  display:block;
  background:#000;
}
.post-actions{
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 16px 4px;
}
.post-action-btn{
  background:none;
  border:none;
  cursor:pointer;
  color:var(--muted);
  font-size:22px;
  padding:6px;
  transition:all .2s ease;
  border-radius:50%;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.post-action-btn:hover{
  transform:scale(1.15);
  color:var(--text);
}
.post-action-btn:active{transform:scale(1.05)}
.post-action-btn.liked{color:#f87171;animation:sendPop .3s ease}
.post-likes{
  font-size:13px;
  font-weight:700;
  padding:0 16px 6px;
  cursor:pointer;
}
.post-likes:hover{text-decoration:underline}
.post-caption{
  padding:4px 16px 12px;
  font-size:14px;
  line-height:1.6;
}
.post-time{
  padding:0 16px 14px;
  font-size:11px;
  color:var(--muted);
}
.post-user-name{
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:color .15s ease;
}
.post-user-name:hover{color:var(--accent)}
.post-user-avatar{
  cursor:pointer;
  transition:transform .2s ease;
}
.post-user-avatar:hover{transform:scale(1.1)}

/* ── STORIES IMPROVEMENTS ── */
.stories-bar{
  display:flex;
  gap:14px;
  padding:14px 16px;
  overflow-x:auto;
  flex-shrink:0;

function _uploadCloudinary(file, cloud, preset, onPct){
  return new Promise((res,rej)=>{

function _uploadImgBB(file, apiKey, onPct){
  return new Promise((res,rej)=>{

      else {throw new Error('unknown_provider');}
      return url;
    } catch(err){lastErr = err;_providerIdx = (idx + 1) % total;}
  }

function extractRTId(url){
  if(!url) return null;
  const m = url.match(/rutube\.ru\/(?:video|play\/embed)\/([a-f0-9]{32})/i);
  if(m) return m[1];
  const m2 = url.match(/([a-f0-9]{32})/i);
  return m2 ? m2[1] : null;
}

  useEffect(()=>{
    const ref=db.ref('stories');
    ref.on('value',s=>{
      const v=s.val()||{};
      const now=Date.now();
      const fresh={};
      Object.entries(v).forEach(([uid,stories])=>{
        const arr=Object.entries(stories||{}).map(([k,sv])=>({k,...sv})).filter(sv=>sv.ts&&(now-sv.ts)<86400000).sort((a,b)=>a.ts-b.ts);

    h('div',{className:'main-area',style:{flex:1,borderRadius:24,overflow:'hidden',display:'flex',flexDirection:'column'}},
      viewProfile
        ?h(UserProfilePage,{uid:viewProfile,me:user.id,onClose:()=>setViewProfile(null),onStartDM:u=>{setViewProfile(null);openDM(u);setShowMobileList(false)}})
        :showRT
          ?h('div',{className:'glass',style:{flex:1,height:'100%',borderRadius:24,display:'flex',flexDirection:'column',overflow:'hidden'}},
              h('div',{style:{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexShrink:0}},
                h('div',{style:{width:28,height:28,borderRadius:8,background:'#ff4444',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}},'▶'),
                h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Видео'),
                h('div',{style:{flex:1}}),
                h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:14,fontWeight:600,padding:'4px 10px',borderRadius:8,transition:'all .15s'},onClick:()=>setShowRT(false),onMouseEnter:e=>e.target.style.color='var(--text)',onMouseLeave:e=>e.target.style.color='var(--muted)'},'✕ Закрыть')
              ),
              h(RutubeTab,{me:user.id,dmConvs,peerUsers,rooms}),
              rtPlaying&&h(RTPlayer,{video:rtPlaying,me:user.id,dmConvs,peerUsers,rooms,onClose:()=>setRtPlaying(null)})
            )
          :showFeed
            ?h('div',{className:'glass',style:{flex:1,height:'100%',borderRadius:24,display:'flex',flexDirection:'column',overflow:'hidden'}},
                h('div',{style:{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexShrink:0}},
                  h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'📸 Лента'),
                  h('div',{style:{flex:1}}),
                  h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:14,fontWeight:600,padding:'4px 10px',borderRadius:8,transition:'all .15s'},onClick:()=>setShowFeed(false),onMouseEnter:e=>e.target.style.color='var(--text)',onMouseLeave:e=>e.target.style.color='var(--muted)'},'✕ Закрыть')
                ),
                h(FeedTab,{me:user.id,meUser:user,onOpenProfile:uid2=>{setViewProfile(uid2);setShowFeed(false)}})
              )
            :activeChat?.type==='dm'
              ?h(DMChat,{key:activeChat.id,me:user.id,peer:activeChat.id,peerUser:activeDMPeer,onBack:()=>{setActiveChat(null);setShowMobileList(true)},peerInst})
              :activeChat?.type==='room'&&activeRoom
                ?h(RoomChat,{key:activeRoom.id,room:activeRoom,me:user.id,onBack:()=>{setActiveChat(null);setShowMobileList(true)}})
                :h('div',{className:'glass',style:{flex:1,height:'100%',borderRadius:24,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'var(--panel)'}},
                    h('div',{style:{fontSize:64,opacity:.1}},'💬'),
                    h('div',{className:'syne',style:{fontSize:26,fontWeight:800,opacity:.15,letterSpacing:'-.04em'}},'Maxify'),
                    h('div',{style:{fontSize:14,color:'var(--muted)',opacity:.4}},'Выберите чат или откройте ленту')
                  )
    ),

    h('div',{className:'mobile-nav'},
      navTabs.map(t=>{
        const isActive=t.id==='profile'?showProfile:t.id==='rt'?showRT&&!showProfile&&!showFeed:t.id==='feed'?showFeed&&!showProfile:!activeChat&&!showRT&&!showFeed&&tab===t.id;
        return h('div',{key:t.id,className:'mobile-nav-btn'+(isActive?' active':''),onClick:()=>{
          if(t.id==='profile'){setShowProfile(true);setShowMobileList(false);setShowRT(false);setShowFeed(false);return}
          if(t.id==='rt'){setShowRT(true);setShowFeed(false);setShowProfile(false);setActiveChat(null);setShowMobileList(false);return}
          if(t.id==='feed'){setShowFeed(true);setShowRT(false);setShowProfile(false);setActiveChat(null);setShowMobileList(false);return}
          setShowProfile(false);setShowRT(false);setShowFeed(false);setTab(t.id);setActiveChat(null);setShowMobileList(true);
        }},
          h('div',{className:'nav-icon',style:{position:'relative'}},t.icon,t.badge&&t.badge>0&&h('span',{style:{position:'absolute',top:-6,right:-8,minWidth:18,height:18,borderRadius:999,background:'var(--danger)',color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,border:'2px solid var(--nav-bg)',boxShadow:'0 2px 8px rgba(248,113,113,.5)',padding:'0 4px'}},t.badge>99?'99+':t.badge)),
          h('div',{className:'nav-label'},t.label)
        );
      })
    ),

    showProfile&&h(ProfileModal,{user,onClose:()=>setShowProfile(false)}),
    showSearch&&h(UserSearch,{me:user.id,onSelect:u=>{openDM(u);setShowMobileList(false)},onClose:()=>setShowSearch(false)}),
    showRoomSearch&&h(RoomSearchModal,{me:user.id,onSelect:r=>{openRoom(r);setShowMobileList(false)},onClose:()=>setShowRoomSearch(false)}),
    createRoom&&h(CreateRoomModal,{me:user.id,type:createRoom,onClose:()=>setCreateRoom(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
