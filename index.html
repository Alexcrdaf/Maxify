/* ─ upload ─ */
const CL_CLOUD='djdcmj2om',CL_PRESET='maxify_unsigned',IMGBB='6b2f4aa4251af974124a1053b9e8b719';
async function upload(file,onPct){
  if(file.type.startsWith('image/')){
    const fd=new FormData();fd.append('image',file);
    const r=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`,{method:'POST',body:fd});
    const j=await r.json();if(!j.success)throw new Error(j.error?.message||'ImgBB error');
    onPct&&onPct(100);return j.data.url;
  }
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CL_PRESET);
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CL_CLOUD}/auto/upload`);
    xhr.upload.onprogress=e=>e.lengthComputable&&onPct&&onPct(e.loaded/e.total*100);
    xhr.onload=()=>{try{const j=JSON.parse(xhr.responseText);j.secure_url?res(j.secure_url):rej(new Error(j.error?.message||'Cloudinary error'))}catch(e){rej(e)}};
    xhr.onerror=()=>rej(new Error('Нет соединения'));xhr.send(fd);
  });
}

    const snap=await db.ref('users/'+u.uid).once('value');

          h('path',{fill:'#4285F4',d:'M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'}),
          h('path',{fill:'#FBBC05',d:'M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'}),

        ),'Войти через Google'),

        if(item.type==='date')return h('div',{key:'d'+i,style:{textAlign:'center',margin:'6px 0'}},h('span',{style:{fontSize:11,color:'var(--text2)',background:'rgba(255,255,255,.06)',padding:'3px 12px',borderRadius:'999px'}},item.label));
        const {m}=item,mine=m.uid===me,sender=uc[m.uid];
        return h('div',{key:m.k||m.ts,className:'msg-in',style:{display:'flex',flexDirection:'column',alignItems:mine?'flex-end':'flex-start',gap:2}},
          !mine&&h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:2,display:'flex',alignItems:'center',gap:5}},h(Avatar,{user:sender,size:16}),sender?.login||'...'),
          h(MsgBubble,{m,mine,onImg:url=>setLb(url)}),h('div',{className:'msg-time'},ts2t(m.ts)));
      }),
      h('div',{ref:botRef})),
    h(InputBar,{onSend:send,canWrite}),
    lb&&h('div',{className:'lightbox',onClick:()=>setLb(null)},h('img',{src:lb,onClick:e=>e.stopPropagation()})),
    info&&h(RoomInfoModal,{room,me,onClose:()=>setInfo(false)}));
}

/* ─ App ─ */
function App(){
  const [user,setUser]=useState(null);const [loading,setLoading]=useState(true);
  const [isDark,setIsDark]=useState(true);
  const [dms,setDms]=useState([]);const [rooms,setRooms]=useState([]);
  const [active,setActive]=useState(null);const [pu,setPu]=useState({});
  const [showSearch,setShowSearch]=useState(false);const [showProfile,setShowProfile]=useState(false);
  const [createRoom,setCreateRoom]=useState(null);const [peerInst,setPeerInst]=useState(null);
  const [tab,setTab]=useState('dms');const [mobScreen,setMobScreen]=useState(null);

  useEffect(()=>{document.body.className=isDark?'':'light'},[isDark]);

  useEffect(()=>auth.onAuthStateChanged(u=>{
    if(u){const ref=db.ref('users/'+u.uid);ref.update({online:true,lastSeen:Date.now()});ref.on('value',s=>{setUser(s.val());setLoading(false)});window.addEventListener('beforeunload',()=>ref.update({online:false,lastSeen:Date.now()}))}
    else{setUser(null);setLoading(false)}
  }),[]);

  useEffect(()=>{
    if(!user)return;
    const id='mx-'+user.id.replace(/[^a-zA-Z0-9]/g,'-');
    const p=new Peer(id,{debug:0});
    p.on('open',pid=>{setPeerInst(p);db.ref('users/'+user.id).update({peerId:pid})});
    p.on('error',err=>{if(err.type==='unavailable-id'){const p2=new Peer(undefined,{debug:0});p2.on('open',pid=>{setPeerInst(p2);db.ref('users/'+user.id).update({peerId:pid})});setPeerInst(p2)}});
    return()=>p.destroy();
  },[user?.id]);

  const loadU=useCallback(uid=>{if(!uid)return;db.ref('users/'+uid).on('value',s=>{const v=s.val();if(v)setPu(p=>({...p,[uid]:v}))})},[]);

  useEffect(()=>{
    if(!user)return;
    const ref=db.ref('dm');
    ref.on('value',s=>{const all=s.val()||{};const mine=Object.entries(all).filter(([k])=>k.includes(user.id)).map(([k,v])=>{const other=k.split('__').find(p=>p!==user.id);return{uid:other,last:v.last||null,unread:v.unread?.[user.id]||0}}).sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));setDms(mine);mine.forEach(c=>loadU(c.uid))});
    return()=>ref.off();
  },[user?.id]);

  useEffect(()=>{
    if(!user)return;
    const ref=db.ref('rooms');
    ref.on('value',s=>{const all=s.val()||{};setRooms(Object.values(all).filter(r=>r.members&&r.members[user.id]))});
    return()=>ref.off();
  },[user?.id]);

  useEffect(()=>{
    if(!user)return;
    const ref=db.ref(`calls/${user.id}/from`);
    ref.on('value',s=>{const v=s.val();if(v){const uid=Object.keys(v)[0];if(uid){loadU(uid);setActive({type:'dm',id:uid});setMobScreen(null)}}});
    return()=>ref.off();
  },[user?.id]);

  const openDM=u=>{setActive({type:'dm',id:u.id});loadU(u.id);setMobScreen(null)};
  const openRoom=r=>{setActive({type:'room',id:r.id});setMobScreen(null)};
  const goBack=()=>{setActive(null);setMobScreen('list')};
  const signOut=async()=>{if(user)await db.ref('users/'+user.id).update({online:false,lastSeen:Date.now()});auth.signOut()};

  if(loading)return h('div',{style:{height:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
    h('div',{className:'syne logo-grad',style:{fontSize:42,fontWeight:800,letterSpacing:'-.04em'}},'Maxify'),
    h('div',{style:{width:34,height:34,border:'3px solid var(--accent)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .8s linear infinite'}}));
  if(!user)return h(Auth);

  const activePeer=active?.type==='dm'?pu[active.id]:null;
  const activeRoom=active?.type==='room'?rooms.find(r=>r.id===active.id):null;
  const groups=rooms.filter(r=>r.type==='group');
  const channels=rooms.filter(r=>r.type==='channel');
  const totalUnread=dms.reduce((s,c)=>s+(c.unread||0),0);

  const listContent=()=>{
    if(tab==='dms')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'9px 12px',borderRadius:'12px',fontSize:13,width:'100%',marginBottom:6},onClick:()=>setShowSearch(true)},'🔍  Найти пользователя'),
      dms.length===0&&h('div',{style:{color:'var(--text2)',fontSize:13,textAlign:'center',padding:'20px 8px',lineHeight:1.9}},'Нет переписок\nНайдите кого-нибудь 👆'),
      dms.map(c=>{const p=pu[c.uid];return h('div',{key:c.uid,className:'chat-row'+(active?.id===c.uid&&active?.type==='dm'?' active':''),onClick:()=>openDM({id:c.uid,...(p||{})})},
        h(Avatar,{user:p,size:44}),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},p?.login||c.uid.slice(0,8)),h('div',{style:{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},c.last?.preview||'...')),
        c.unread>0&&h('div',{className:'unread'},c.unread))}));
    if(tab==='groups')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'9px 12px',borderRadius:'12px',fontSize:13,width:'100%',marginBottom:6},onClick:()=>setCreateRoom('group')},'+ Создать группу'),
      groups.length===0&&h('div',{style:{color:'var(--text2)',fontSize:13,textAlign:'center',padding:'20px 8px'}},'Нет групп'),
      groups.map(r=>h('div',{key:r.id,className:'chat-row'+(active?.id===r.id?' active':''),onClick:()=>openRoom(r)},
        h('div',{style:{width:44,height:44,borderRadius:'50%',background:'rgba(77,124,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'👥'),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},r.name),h('div',{style:{fontSize:12,color:'var(--text2)'}},r.last?.preview||r.desc||'Группа')))));
    if(tab==='channels')return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'9px 12px',borderRadius:'12px',fontSize:13,width:'100%',marginBottom:6},onClick:()=>setCreateRoom('channel')},'+ Создать канал'),
      channels.length===0&&h('div',{style:{color:'var(--text2)',fontSize:13,textAlign:'center',padding:'20px 8px'}},'Нет каналов'),
      channels.map(r=>h('div',{key:r.id,className:'chat-row'+(active?.id===r.id?' active':''),onClick:()=>openRoom(r)},
        h('div',{style:{width:44,height:44,borderRadius:'50%',background:'rgba(123,92,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'📢'),
        h('div',{style:{flex:1,minWidth:0}},h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},r.name),h('div',{style:{fontSize:12,color:'var(--text2)'}},r.last?.preview||r.desc||'Канал')))));
  };

  const navTabs=[{id:'dms',icon:'💬',label:'Чаты',badge:totalUnread},{id:'groups',icon:'👥',label:'Группы'},{id:'channels',icon:'📢',label:'Каналы'},{id:'profile',icon:'👤',label:'Профиль'}];

  return h('div',{className:'app-layout'},
    /* DESKTOP SIDEBAR */
    h('div',{className:'glass sidebar'},
      h('div',{className:'s-me',onClick:()=>setShowProfile(true)},
        h(Avatar,{user,size:36,ring:true}),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{className:'syne',style:{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},user.login),
          h('div',{style:{fontSize:11,color:peerInst?'var(--ok)':'var(--text2)'}},peerInst?'● онлайн':'● подключение...')),
        h('span',{title:'Сменить тему',style:{cursor:'pointer',fontSize:16,opacity:.6,padding:'4px'},onClick:e=>{e.stopPropagation();setIsDark(d=>!d)}},isDark?'🌙':'☀️')),
      h('div',{className:'hr'}),
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'8px 12px',borderRadius:'12px',fontSize:13,width:'100%'},onClick:()=>setShowSearch(true)},'🔍  Найти пользователя'),
      h('div',{className:'hr'}),
      h('div',{className:'tab-bar'},[{id:'dms',l:'ЛС'},{id:'groups',l:'Группы'},{id:'channels',l:'Каналы'}].map(t=>h('div',{key:t.id,className:'tab'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.l))),
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}},listContent()),
      h('div',{className:'hr'}),
      h('button',{style:{background:'none',border:'none',color:'var(--text2)',fontSize:12,cursor:'pointer',padding:'6px',textAlign:'center',borderRadius:'8px',transition:'color var(--tr)'},onMouseEnter:e=>e.target.style.color='var(--danger)',onMouseLeave:e=>e.target.style.color='',onClick:signOut},'Выйти')),

    /* DESKTOP MAIN */
    h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}},
      active?.type==='dm'?h(DMChat,{key:active.id,me:user.id,peer:active.id,peerUser:activePeer,onBack:goBack,peerInst})
      :active?.type==='room'&&activeRoom?h(RoomChat,{key:activeRoom.id,room:activeRoom,me:user.id,onBack:goBack})
      :h('div',{className:'glass chat-wrap desktop-empty',style:{alignItems:'center',justifyContent:'center',gap:14,display:'flex',flexDirection:'column'}},
          h('div',{style:{fontSize:60,opacity:.1,animation:'fadeIn 1.2s both'}},'💬'),
          h('div',{className:'syne logo-grad',style:{fontSize:30,fontWeight:800,letterSpacing:'-.04em',opacity:.35}},'Maxify'),
          h('div',{style:{fontSize:14,color:'var(--text2)',opacity:.5}},'Выберите чат слева'),
          h('button',{className:'btn btn-ghost',style:{marginTop:8,borderRadius:'999px'},onClick:()=>setShowSearch(true)},'🔍 Найти пользователя'))),

    /* MOBILE LIST SCREEN */
    mobScreen==='list'&&!active&&h('div',{className:'mob-list'},
      h('div',{className:'mob-list-hdr'},
        h('div',{className:'syne',style:{fontWeight:800,fontSize:21}},tab==='dms'?'Сообщения':tab==='groups'?'Группы':'Каналы'),
        h('div',{style:{display:'flex',gap:8}},
          tab==='dms'&&h('button',{className:'btn btn-ghost btn-icon',onClick:()=>setShowSearch(true)},'🔍'),
          (tab==='groups'||tab==='channels')&&h('button',{className:'btn btn-primary btn-icon',style:{borderRadius:'999px'},onClick:()=>setCreateRoom(tab==='groups'?'group':'channel')},'+'))),
      h('div',{className:'mob-list-body'},listContent())),

    /* MOBILE BOTTOM NAV */
    h('div',{className:'mob-nav'},
      navTabs.map(t=>{
        const isA=t.id==='profile'?showProfile:(mobScreen==='list'&&tab===t.id&&!active);
        return h('div',{key:t.id,className:'nav-btn'+(isA?' active':''),onClick:()=>{
          if(t.id==='profile'){setShowProfile(true);setMobScreen(null);return}
          setShowProfile(false);setTab(t.id);setActive(null);setMobScreen('list');
        }},
          h('div',{className:'ni'},t.icon),
          h('div',{className:'nl'},t.label),
          t.badge>0&&h('div',{className:'nav-badge'},t.badge>99?'99+':t.badge));
      })),

    showProfile&&h(ProfileModal,{user,isDark,onToggle:()=>setIsDark(d=>!d),onClose:()=>setShowProfile(false)}),
    showSearch&&h(UserSearch,{me:user.id,onSelect:u=>{openDM(u);setShowSearch(false)},onClose:()=>setShowSearch(false)}),
    createRoom&&h(CreateRoomModal,{me:user.id,type:createRoom,onClose:()=>setCreateRoom(null)}));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
