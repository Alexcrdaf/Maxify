/* ── DARK theme (default) ───────────────────────────────────────────────── */

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;transition:background .25s,color .25s;

// ── Utils ────────────────────────────────────────────────────────────────────
const dmId=(a,b)=>[a,b].sort().join('__');
const ts2t=ts=>{if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')};
const ts2d=ts=>{if(!ts)return'';const d=new Date(ts),t=new Date();if(d.toDateString()===t.toDateString())return'сегодня';const y=new Date(t);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'вчера';return d.toLocaleDateString('ru')};

// ── Sounds ───────────────────────────────────────────────────────────────────
function beep(freq1,freq2,dur,vol){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain(); g.connect(ctx.destination); g.gain.setValueAtTime(vol,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    [freq1,freq2].filter(Boolean).forEach(f=>{const o=ctx.createOscillator();o.frequency.value=f;o.connect(g);o.start();o.stop(ctx.currentTime+dur)});
  }catch(e){}
}
const playSend=()=>beep(880,1200,.16,.15);
const playRecv=()=>beep(520,660,.2,.1);

// ── FIX: Detect best supported MediaRecorder MIME type ──────────────────────
function getBestMimeType(kind){
  const audioTypes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
  const videoTypes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  const list=kind==='audio'?audioTypes:videoTypes;
  for(const t of list){if(MediaRecorder.isTypeSupported(t)) return t;}
  return '';
}

// ── Upload: Cloudinary ───────────────────────────────────────────────────────
const CL_CLOUD  = 'djdcmj2om';
const CL_PRESET = 'maxify';

async function upload(file, onPct) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CL_PRESET);
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CL_CLOUD + '/auto/upload');
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onPct) onPct(Math.round(e.loaded / e.total * 100));
    };
    xhr.onload = () => {
      try {
        const j = JSON.parse(xhr.responseText);
        if (j.secure_url) resolve(j.secure_url);
        else reject(new Error(j.error?.message || xhr.responseText.slice(0, 120)));
      } catch(e) { reject(new Error('parse error: ' + xhr.responseText.slice(0, 120))); }
    };
    xhr.onerror = () => reject(new Error('Нет соединения'));
    xhr.send(fd);
  });
}

// ── Reserved / verified accounts ─────────────────────────────────────────────
const VERIFIED_EMAILS=['dima.julbarisov01@gmail.com'];
const RESERVED_LOGINS=['LGlittleguy'];

// ── FIX: Avatar — безопасная обработка любого типа аргумента ────────────────
function Avatar({user, size=36, ring=false}){
  // user может быть объектом, строкой или null/undefined
  const login = (typeof user === 'string' ? user : user?.login) || '?';
  const avatarUrl = typeof user === 'object' ? user?.avatarUrl : null;
  const isOnline  = typeof user === 'object' ? user?.online : false;
  const email     = typeof user === 'object' ? user?.email : null;

  const cols=['#4f8cff','#9b8cff','#34d399','#f87171','#fbbf24','#ec4899'];
  // FIX: проверяем что login — строка перед charCodeAt
  const safeLogin = typeof login === 'string' && login.length > 0 ? login : '?';
  const col = cols[(safeLogin.charCodeAt(0) || 65) % cols.length];
  const isVerified = email && VERIFIED_EMAILS.includes(email);
  const badgeSize  = Math.max(12, Math.round(size * 0.35));
  const firstChar  = safeLogin[0].toUpperCase();

  return h('div',{style:{position:'relative',flexShrink:0,width:size,height:size}},
    avatarUrl
      ? h('img',{src:avatarUrl,className:'avatar-img',style:{width:size,height:size,boxShadow:ring?'0 0 0 2px #4f8cff,0 0 12px rgba(79,140,255,.3)':'none'}})
      : h('div',{style:{width:size,height:size,borderRadius:'50%',background:col,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Syne',fontWeight:700,fontSize:size*.4,color:'#fff',boxShadow:ring?'0 0 0 2px #4f8cff,0 0 12px rgba(79,140,255,.3)':'none',userSelect:'none'}},firstChar),
    isOnline&&h('div',{className:'dot-on'}),
    isVerified&&h('div',{
      title:'Разработчик Maxify',
      style:{position:'absolute',bottom:-2,right:-2,width:badgeSize,height:badgeSize,borderRadius:'50%',
        background:'linear-gradient(135deg,#4f8cff,#9b8cff)',border:'2px solid var(--bg)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:badgeSize*.6,lineHeight:1,zIndex:2}
    },'✓')
  );
}

// ── Modal wrapper ────────────────────────────────────────────────────────────
function Modal({onClose,children,width=380}){
  return h('div',{className:'modal-bg',onClick:onClose},

// ── Auth ─────────────────────────────────────────────────────────────────────
function Auth(){
  const [mode,setMode]=useState('login');
  const [f,setF]=useState({email:'',pass:'',name:''});
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  // FIX: ensureProfile теперь возвращает профиль и не перегружает страницу
  const ensureProfile=async(u,displayName)=>{
    const ref=db.ref('users/'+u.uid);
    const snap=await ref.once('value');
    if(!snap.val()){
      const profile={
        id:u.uid,
        login:displayName||u.displayName||u.email.split('@')[0],
        email:u.email,
        avatarUrl:u.photoURL||null,
        online:true,
        lastSeen:Date.now(),
        createdAt:Date.now()
      };
      await ref.set(profile);
    } else {
      await ref.update({online:true,lastSeen:Date.now()});
    }
  };

  const signInGoogle=async()=>{
    setErr('');setBusy(true);
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      const r=await auth.signInWithPopup(provider);
      await ensureProfile(r.user);
    }catch(e){
      if(e.code!=='auth/popup-closed-by-user') setErr('Ошибка входа через Google: '+e.message);
    }
    setBusy(false);
  };

  const submit=async()=>{
    setErr('');setBusy(true);
    try{
      if(mode==='register'){
        if(!f.name.trim()){setErr('Введите имя');setBusy(false);return}
        if(f.name.trim().length<2){setErr('Имя слишком короткое');setBusy(false);return}
        if(RESERVED_LOGINS.map(l=>l.toLowerCase()).includes(f.name.trim().toLowerCase())
           && !VERIFIED_EMAILS.includes(f.email)){
          setErr('Это имя зарезервировано');setBusy(false);return;
        }
        if(!f.email.trim()){setErr('Введите email');setBusy(false);return}
        if(f.pass.length<6){setErr('Пароль должен быть не менее 6 символов');setBusy(false);return}
        const r=await auth.createUserWithEmailAndPassword(f.email.trim(),f.pass);
        // FIX: обновляем displayName в Firebase Auth тоже
        await r.user.updateProfile({displayName:f.name.trim()});
        await ensureProfile(r.user,f.name.trim());
        // auth.onAuthStateChanged подхватит нового пользователя автоматически
      }else{

// ── FIX: User Search Modal — поиск теперь работает через правила Firebase ───
function UserSearch({me,onSelect,onClose}){
  const [q,setQ]=useState('');
  const [results,setResults]=useState([]);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{
    if(!q.trim()){setResults([]);setErr('');return}
    setBusy(true);setErr('');
    const t=setTimeout(async()=>{
      try{
        // FIX: читаем всех пользователей и фильтруем на клиенте
        // (для больших баз надо добавить индекс в Firebase rules)
        const snap=await db.ref('users').once('value');
        const all=snap.val()||{};
        const ql=q.trim().toLowerCase();
        const res=Object.values(all).filter(u=>{
          if(!u||!u.id) return false;
          if(u.id===me) return false;
          const loginMatch=typeof u.login==='string'&&u.login.toLowerCase().includes(ql);
          const emailMatch=typeof u.email==='string'&&u.email.toLowerCase().includes(ql);
          return loginMatch||emailMatch;
        });
        setResults(res);
      }catch(e){
        setErr('Ошибка поиска: '+e.message);
        setResults([]);
      }
      setBusy(false);
    },350);
    return()=>clearTimeout(t);
  },[q,me]);

  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Найти пользователя'),
      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),
    h('input',{placeholder:'Имя или email...',value:q,onChange:e=>setQ(e.target.value),autoFocus:true}),
    h('div',{style:{maxHeight:300,overflowY:'auto',display:'flex',flexDirection:'column',gap:4,minHeight:60}},
      busy&&h('div',{style:{color:'var(--muted)',fontSize:13,textAlign:'center',padding:20}},'🔍 Поиск...'),
      err&&h('div',{style:{color:'var(--danger)',fontSize:12,textAlign:'center',padding:12}},err),
      !busy&&q.trim()&&results.length===0&&!err&&h('div',{style:{color:'var(--muted)',fontSize:13,textAlign:'center',padding:20}},'Никого не найдено'),
      !busy&&results.map(u=>h('div',{key:u.id,className:'search-item',onClick:()=>{onSelect(u);onClose()}},
        h(Avatar,{user:u,size:38}),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:5}},
            h('span',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.login),
            u.email&&VERIFIED_EMAILS.includes(u.email)&&h('span',{title:'Разработчик',style:{fontSize:11,background:'linear-gradient(135deg,#4f8cff,#9b8cff)',borderRadius:'50%',width:14,height:14,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,flexShrink:0}},'✓')
          ),
          h('div',{style:{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.email),
          h('div',{style:{fontSize:10,color:u.online?'var(--ok)':'var(--muted)'}},u.online?'● онлайн':'○ оффлайн')
        )
      ))
    )
  );
}

// ── Profile Modal ────────────────────────────────────────────────────────────
function ProfileModal({user,onClose}){
  const [tab,setTab]=useState('edit');
  const [name,setName]=useState(user.login||'');
  const [bio,setBio]=useState(user.bio||'');
  const [saving,setSaving]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [uploadPct,setUploadPct]=useState(0);
  const [confirmDel,setConfirmDel]=useState(false);
  const [delPass,setDelPass]=useState('');
  const [delErr,setDelErr]=useState('');
  const fileRef=useRef();

  const save=async()=>{
    if(!name.trim()) return;
    setSaving(true);
    await db.ref('users/'+user.id).update({login:name.trim(),bio:bio.trim()});
    setSaving(false);
  };

  const uploadAvatar=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(true);
    try{
      const url=await upload(file,p=>setUploadPct(p));
      await db.ref('users/'+user.id).update({avatarUrl:url});
    }catch(ex){alert('Ошибка загрузки: '+ex.message)}
    setUploading(false);setUploadPct(0);
    e.target.value='';
  };

  const removeAvatar=async()=>{await db.ref('users/'+user.id).update({avatarUrl:null})};

  const deleteAccount=async()=>{
    setDelErr('');
    try{
      const cred=firebase.auth.EmailAuthProvider.credential(user.email,delPass);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await db.ref('users/'+user.id).remove();
      await auth.currentUser.delete();
    }catch(e){
      setDelErr(e.code==='auth/wrong-password'?'Неверный пароль':e.message);
    }
  };

  const [darkMode,setDarkMode]=useState(!document.body.classList.contains('light'));
  const toggleTheme=(dark)=>{
    if(dark){document.body.classList.remove('light');localStorage.setItem('theme','dark')}
    else{document.body.classList.add('light');localStorage.setItem('theme','light')}
    setDarkMode(dark);
  };

  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Настройки профиля'),
      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),
    h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:10}},
      h(Avatar,{user,size:72,ring:true}),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{className:'syne',style:{fontWeight:700,fontSize:18}},user.login),
        user?.email&&VERIFIED_EMAILS.includes(user.email)&&h('div',{
          title:'Аккаунт разработчика Maxify',
          style:{fontSize:11,padding:'2px 8px',borderRadius:999,background:'linear-gradient(135deg,#4f8cff,#9b8cff)',color:'#fff',fontWeight:700,display:'flex',alignItems:'center',gap:4}
        },'✓ Разработчик')
      )
    ),
    h('div',{className:'tab-bar'},
      ['edit','avatar','theme','danger'].map(t=>h('div',{key:t,className:'tab'+(tab===t?' active':''),onClick:()=>setTab(t)},
        t==='edit'?'Профиль':t==='avatar'?'Аватар':t==='theme'?'🎨 Тема':'⚠️ Аккаунт'
      ))
    ),
    h('div',{className:'hr'}),
    tab==='edit'&&h(React.Fragment,null,
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:11,color:'var(--muted)',fontWeight:600,letterSpacing:'.06em'}},'ИМЯ'),
        h('input',{value:name,onChange:e=>setName(e.target.value),placeholder:'Имя пользователя'})
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        h('div',{style:{fontSize:11,color:'var(--muted)',fontWeight:600,letterSpacing:'.06em'}},'О СЕБЕ'),
        h('textarea',{value:bio,onChange:e=>setBio(e.target.value),rows:3,placeholder:'Расскажите о себе...',style:{resize:'none'}})
      ),
      h('div',{style:{fontSize:13,display:'flex',justifyContent:'space-between',color:'var(--muted)'}},'Email',h('span',{style:{color:'var(--text)'}},user.email)),
      h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center'},onClick:save,disabled:saving},saving?'Сохранение...':'💾 Сохранить')
    ),
    tab==='avatar'&&h(React.Fragment,null,
      uploading&&h('div',{className:'prog-bar',style:{marginBottom:4}},h('div',{className:'prog-fill',style:{width:uploadPct+'%'}})),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        h('button',{className:'btn btn-ghost',style:{width:'100%',justifyContent:'center'},onClick:()=>fileRef.current.click(),disabled:uploading},uploading?'Загрузка...':'📷 Загрузить фото'),
        h('input',{ref:fileRef,type:'file',accept:'image/*',style:{display:'none'},onChange:uploadAvatar}),
        user.avatarUrl&&h('button',{className:'btn btn-danger',style:{width:'100%',justifyContent:'center'},onClick:removeAvatar},'🗑 Удалить аватар'),
        h('div',{style:{fontSize:12,color:'var(--muted)',textAlign:'center'}},'Рекомендуется квадратное фото')
      )
    ),
    tab==='theme'&&h(React.Fragment,null,
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{fontSize:12,color:'var(--muted)',fontWeight:600,letterSpacing:'.06em'}},'ТЕМА ОФОРМЛЕНИЯ'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
          h('div',{
            onClick:()=>toggleTheme(true),
            style:{padding:'16px 12px',borderRadius:14,cursor:'pointer',textAlign:'center',
              border:'2px solid '+(darkMode?'var(--accent)':'var(--border)'),
              background:darkMode?'rgba(79,140,255,.1)':'var(--panel)',transition:'all .2s'}

              background:!darkMode?'rgba(37,99,235,.1)':'var(--panel)',transition:'all .2s'}
          },
            h('div',{style:{fontSize:28,marginBottom:6}},'☀️'),
            h('div',{className:'syne',style:{fontWeight:700,fontSize:13}},'Светлая'),
            h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:2}},'Яркий режим')
          )
        )
      )
    ),
    tab==='danger'&&h(React.Fragment,null,
      !confirmDel
        ? h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
            h('div',{style:{fontSize:13,color:'var(--muted)',lineHeight:1.6}},'Удаление аккаунта — необратимое действие. Все ваши данные будут удалены.'),
            h('button',{className:'btn btn-danger',style:{width:'100%',justifyContent:'center'},onClick:()=>setConfirmDel(true)},'🗑 Удалить аккаунт')
          )
        : h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
            h('div',{style:{fontSize:13,color:'var(--danger)',fontWeight:600}},'Введите пароль для подтверждения:'),
            h('input',{type:'password',placeholder:'Пароль',value:delPass,onChange:e=>setDelPass(e.target.value)}),

            h('div',{style:{display:'flex',gap:8}},

function CreateRoomModal({me,type,onClose}){
  const [name,setName]=useState('');
  const [desc,setDesc]=useState('');
  const [busy,setBusy]=useState(false);

  const create=async()=>{
    if(!name.trim()) return;
    setBusy(true);
    const ref=db.ref('rooms').push();
    await ref.set({
      id:ref.key, name:name.trim(), desc:desc.trim(),
      type, owner:me, members:{[me]:true}, createdAt:Date.now()

    setBusy(false);

  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},

      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),

}

// ── Room Info Modal ──────────────────────────────────────────────────────────
function RoomInfoModal({room,me,onClose}){
  const [tab,setTab]=useState('members');
  const [searchQ,setSearchQ]=useState('');
  const [searchRes,setSearchRes]=useState([]);
  const [members,setMembers]=useState({});

  useEffect(()=>{
    const ref=db.ref('rooms/'+room.id+'/members');
    ref.on('value',s=>setMembers(s.val()||{}));
    return()=>ref.off();
  },[room.id]);

  useEffect(()=>{
    if(!searchQ.trim()){setSearchRes([]);return}
    const t=setTimeout(async()=>{
      const snap=await db.ref('users').once('value');
      const all=snap.val()||{};
      const ql=searchQ.toLowerCase();
      setSearchRes(Object.values(all).filter(u=>u&&u.id&&!members[u.id]&&(u.login?.toLowerCase().includes(ql)||u.email?.toLowerCase().includes(ql))));
    },300);
    return()=>clearTimeout(t);
  },[searchQ,members]);

  const addMember=async uid=>{await db.ref('rooms/'+room.id+'/members/'+uid).set(true)};
  const removeMember=async uid=>{if(uid===room.owner)return;await db.ref('rooms/'+room.id+'/members/'+uid).remove()};
  const deleteRoom=async()=>{
    if(!confirm('Удалить?')) return;
    await db.ref('rooms/'+room.id).remove();
    await db.ref('room_msgs/'+room.id).remove();
    onClose();
  };
  const leaveRoom=async()=>{await db.ref('rooms/'+room.id+'/members/'+me).remove();onClose()};
  const isOwner=me===room.owner;

  return h(Modal,{onClose,width:420},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},room.name),
        room.desc&&h('div',{style:{fontSize:12,color:'var(--muted)',marginTop:2}},room.desc)
      ),
      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),
    h('div',{className:'tab-bar'},
      ['members','add'].map(t=>h('div',{key:t,className:'tab'+(tab===t?' active':''),onClick:()=>setTab(t)},
        t==='members'?`Участники (${Object.keys(members).length})`:'Добавить'
      ))
    ),
    h('div',{className:'hr'}),
    tab==='members'&&h('div',{style:{maxHeight:260,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}},
      Object.keys(members).map(uid=>h(MemberRow,{key:uid,uid,isOwner,ownerId:room.owner,me,onRemove:()=>removeMember(uid)}))
    ),
    tab==='add'&&h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
      h('input',{placeholder:'Поиск...',value:searchQ,onChange:e=>setSearchQ(e.target.value),autoFocus:true}),
      h('div',{style:{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}},
        searchRes.map(u=>h('div',{key:u.id,className:'search-item',onClick:()=>addMember(u.id)},
          h(Avatar,{user:u,size:34}),
          h('div',{style:{flex:1}},h('div',{style:{fontWeight:600,fontSize:13}},u.login),h('div',{style:{fontSize:11,color:'var(--muted)'}},u.email)),
          h('span',{style:{fontSize:11,color:'var(--accent)'}},'+ Добавить')
        ))
      )
    ),
    h('div',{className:'hr'}),
    h('div',{style:{display:'flex',gap:8}},
      !isOwner&&h('button',{className:'btn btn-danger',style:{flex:1,justifyContent:'center'},onClick:leaveRoom},'Покинуть'),
      isOwner&&h('button',{className:'btn btn-danger',style:{flex:1,justifyContent:'center'},onClick:deleteRoom},'🗑 Удалить')
    )
  );
}

function MemberRow({uid,isOwner,ownerId,me,onRemove}){
  const [u,setU]=useState(null);
  useEffect(()=>{db.ref('users/'+uid).once('value').then(s=>setU(s.val()))},[uid]);
  if(!u) return null;
  const canRemove=isOwner&&uid!==ownerId;
  return h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:12}},
    h(Avatar,{user:u,size:34}),
    h('div',{style:{flex:1}},
      h('div',{style:{fontWeight:600,fontSize:13}},u.login+(uid===ownerId?' 👑':'')),
      h('div',{style:{fontSize:11,color:'var(--muted)'}},u.online?'онлайн':'оффлайн')
    ),
    canRemove&&h('button',{className:'btn btn-danger',style:{padding:'4px 10px',fontSize:11},onClick:onRemove},'Удалить')
  );
}

// ── Call Overlay ─────────────────────────────────────────────────────────────
function CallOverlay({peerUser,isVideo,isIncoming,onAccept,onEnd,localStream,remoteStream}){
  const localRef=useRef(),remoteRef=useRef();
  const [muted,setMuted]=useState(false);
  const [camOff,setCamOff]=useState(false);
  const [dur,setDur]=useState(0);
  const timerRef=useRef();
  const connected=!!remoteStream;
  useEffect(()=>{if(localRef.current&&localStream){localRef.current.srcObject=localStream;localRef.current.play().catch(()=>{})}},[localStream]);
  useEffect(()=>{if(remoteRef.current&&remoteStream){remoteRef.current.srcObject=remoteStream;remoteRef.current.play().catch(()=>{})}},[remoteStream]);
  useEffect(()=>{if(connected){timerRef.current=setInterval(()=>setDur(d=>d+1),1000)}return()=>clearInterval(timerRef.current)},[connected]);
  const tglMute=()=>{localStream?.getAudioTracks().forEach(t=>{t.enabled=muted});setMuted(m=>!m)};
  const tglCam=()=>{localStream?.getVideoTracks().forEach(t=>{t.enabled=camOff});setCamOff(c=>!c)};
  return h('div',{className:'call-wrap'},
    isVideo&&connected
      ?h('div',{style:{position:'relative',width:420,height:280,borderRadius:24,overflow:'hidden',background:'#000',border:'1px solid var(--border)'}},
          h('video',{ref:remoteRef,autoPlay:true,style:{width:'100%',height:'100%',objectFit:'cover'}}),
          h('video',{ref:localRef,autoPlay:true,muted:true,style:{position:'absolute',bottom:12,right:12,width:100,height:80,objectFit:'cover',borderRadius:12,border:'2px solid var(--accent)'}})
        )
      :h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:12}},
          h('div',{className:!connected?'ring-anim':''},h(Avatar,{user:peerUser,size:80,ring:true})),
          h('div',{className:'syne',style:{fontWeight:700,fontSize:22}},peerUser?.login||'...'),
          h('div',{style:{fontSize:13,color:'var(--muted)'}},isIncoming&&!connected?`Входящий ${isVideo?'видео':'аудио'}звонок...`:!connected?'Вызов...':fmtDur(dur))
        ),
    h('div',{style:{display:'flex',gap:14,marginTop:12}},
      isIncoming&&!connected
        ?h('button',{className:'btn btn-primary',style:{borderRadius:999,padding:'12px 28px',fontSize:16,justifyContent:'center'},onClick:onAccept},'✅ Ответить')
        :h(React.Fragment,null,
            h('button',{style:{width:52,height:52,borderRadius:'50%',border:'none',cursor:'pointer',fontSize:20,background:muted?'rgba(248,113,113,.2)':'rgba(255,255,255,.1)',transition:'all .15s'},onClick:tglMute},muted?'🔇':'🎙️'),
            isVideo&&h('button',{style:{width:52,height:52,borderRadius:'50%',border:'none',cursor:'pointer',fontSize:20,background:camOff?'rgba(248,113,113,.2)':'rgba(255,255,255,.1)',transition:'all .15s'},onClick:tglCam},camOff?'📵':'📷')
          ),
      h('button',{className:'pulse-red',style:{width:52,height:52,borderRadius:'50%',border:'none',cursor:'pointer',fontSize:20,background:'var(--danger)'},onClick:onEnd},'📵')
    )
  );
}

// ── Chat Input Bar ───────────────────────────────────────────────────────────
function InputBar({onSend,chatName,canWrite=true}){
  const [text,setText]=useState('');
  const [showAttach,setShowAttach]=useState(false);
  const [voiceRec,setVoiceRec]=useState(false);
  const [voiceDur,setVoiceDur]=useState(0);
  const [vnoteMode,setVnoteMode]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [uploadPct,setUploadPct]=useState(0);
  const [uploadErr,setUploadErr]=useState('');
  const fileRef=useRef();
  const voiceRef=useRef();
  const voiceStreamRef=useRef();
  const voiceTO=useRef();
  const vnoteRef=useRef();
  const vnoteRecRef=useRef();
  const vnoteStreamRef=useRef();
  const sendBtnRef=useRef();

  const doSend=useCallback(payload=>{
    if(payload.type==='text'&&!payload.text?.trim()) return;
    onSend(payload);
    setText('');
    playSend();
    if(sendBtnRef.current){
      sendBtnRef.current.classList.remove('send-pop');
      void sendBtnRef.current.offsetWidth;
      sendBtnRef.current.classList.add('send-pop');
    }
  },[onSend]);

  const handleFile=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(true); setShowAttach(false); setUploadErr('');
    try{
      const url=await upload(file,p=>setUploadPct(p));
      if(file.type.startsWith('image/')) doSend({type:'image',url,name:file.name});
      else if(file.type.startsWith('video/')) doSend({type:'file-video',url,name:file.name});
      else doSend({type:'file',url,name:file.name});
    }catch(ex){setUploadErr('Ошибка загрузки: '+ex.message)}
    setUploading(false);setUploadPct(0);
    e.target.value='';
  };

  const startVoice=async()=>{
    setUploadErr('');
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({audio:true})}
    catch(e){setUploadErr('Нет доступа к микрофону');return}
    voiceStreamRef.current=stream;
    const mimeType=getBestMimeType('audio');
    let rec;
    try{rec=new MediaRecorder(stream,mimeType?{mimeType}:{})}
    catch(e){rec=new MediaRecorder(stream)}
    voiceRef.current=rec;
    setVoiceRec(true);setVoiceDur(0);
    voiceTO.current=setInterval(()=>setVoiceDur(d=>d+1),1000);
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data&&e.data.size>0) chunks.push(e.data)};
    rec.onstop=async()=>{
      clearInterval(voiceTO.current);setVoiceRec(false);
      voiceStreamRef.current?.getTracks().forEach(t=>t.stop());
      voiceStreamRef.current=null;
      if(chunks.length===0) return;
      const actualMime=rec.mimeType||'audio/webm';
      const ext=actualMime.includes('ogg')?'ogg':actualMime.includes('mp4')?'mp4':'webm';
      const blob=new Blob(chunks,{type:actualMime});
      setUploading(true);
      try{
        const f=new File([blob],`voice_${Date.now()}.${ext}`,{type:actualMime});
        const url=await upload(f,p=>setUploadPct(p));
        doSend({type:'voice',url});
      }catch(ex){setUploadErr('Ошибка загрузки: '+ex.message)}
      setUploading(false);setUploadPct(0);
    };
    rec.start(250);
  };

  const stopVoice=()=>{if(voiceRef.current&&voiceRef.current.state!=='inactive') voiceRef.current.stop()};
  const cancelVoice=()=>{
    clearInterval(voiceTO.current);
    if(voiceRef.current&&voiceRef.current.state!=='inactive'){
      voiceRef.current.ondataavailable=null;voiceRef.current.onstop=null;
      try{voiceRef.current.stop()}catch(e){}
    }
    voiceStreamRef.current?.getTracks().forEach(t=>t.stop());
    voiceStreamRef.current=null;voiceRef.current=null;
    setVoiceRec(false);setVoiceDur(0);
  };

  const startVnote=async()=>{
    setUploadErr('');
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true})}
    catch(e){try{stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true})}
    catch(e2){setUploadErr('Нет доступа к камере');return}}
    vnoteStreamRef.current=stream;setVnoteMode(true);setShowAttach(false);
    setTimeout(()=>{if(vnoteRef.current){vnoteRef.current.srcObject=stream;vnoteRef.current.play().catch(()=>{})}},80);
    const mimeType=getBestMimeType('video');
    let rec;
    try{rec=new MediaRecorder(stream,mimeType?{mimeType}:{})}
    catch(e){rec=new MediaRecorder(stream)}
    vnoteRecRef.current=rec;
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data&&e.data.size>0) chunks.push(e.data)};
    rec.onstop=async()=>{
      setVnoteMode(false);
      vnoteStreamRef.current?.getTracks().forEach(t=>t.stop());
      vnoteStreamRef.current=null;
      if(chunks.length===0) return;
      const actualMime=rec.mimeType||'video/webm';
      const ext=actualMime.includes('mp4')?'mp4':'webm';
      const blob=new Blob(chunks,{type:actualMime});
      setUploading(true);
      try{
        const f=new File([blob],`vnote_${Date.now()}.${ext}`,{type:actualMime});
        const url=await upload(f,p=>setUploadPct(p));
        doSend({type:'video-note',url});
      }catch(ex){setUploadErr('Ошибка загрузки: '+ex.message)}
      setUploading(false);setUploadPct(0);
    };
    rec.start(250);
  };

  const stopVnote=()=>{if(vnoteRecRef.current&&vnoteRecRef.current.state!=='inactive') vnoteRecRef.current.stop()};
  const cancelVnote=()=>{
    if(vnoteRecRef.current&&vnoteRecRef.current.state!=='inactive'){
      vnoteRecRef.current.ondataavailable=null;vnoteRecRef.current.onstop=null;
      try{vnoteRecRef.current.stop()}catch(e){}
    }
    vnoteStreamRef.current?.getTracks().forEach(t=>t.stop());
    vnoteStreamRef.current=null;vnoteRecRef.current=null;setVnoteMode(false);
  };

  if(!canWrite) return h('div',{style:{padding:'12px 18px',borderTop:'1px solid var(--border)',textAlign:'center',fontSize:13,color:'var(--muted)',flexShrink:0}},'Только владелец может писать в этот канал');

  return h('div',{style:{flexShrink:0}},
    uploading&&h('div',{className:'prog-bar'},h('div',{className:'prog-fill',style:{width:uploadPct+'%'}})),
    uploadErr&&h('div',{style:{padding:'4px 14px',fontSize:12,color:'var(--danger)',background:'rgba(248,113,113,.08)'}},uploadErr),
    voiceRec
      ?h('div',{className:'input-wrap',style:{padding:'10px 14px',borderTop:'1px solid var(--border)',display:'flex',gap:10,alignItems:'center'}},
          h('div',{className:'voice-bar',style:{flex:1}},
            h('span',{style:{color:'var(--danger)',fontWeight:700,fontSize:13,minWidth:36}},fmtDur(voiceDur)),
            h('div',{className:'voice-wave'},h('span'),h('span'),h('span'),h('span'),h('span'),h('span'),h('span')),
            h('span',{style:{fontSize:12,color:'var(--muted)'}},chatName||'...')
          ),
          h('button',{className:'btn btn-ghost',style:{borderRadius:999,padding:'8px 14px'},onClick:cancelVoice},'✕'),
          h('button',{className:'btn btn-primary',style:{borderRadius:999,padding:'8px 18px',justifyContent:'center'},onClick:stopVoice},'✔ Отправить')
        )
      :h('div',{className:'input-wrap',style:{padding:'10px 14px',borderTop:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',position:'relative'}},
          showAttach&&h('div',{className:'attach-menu'},
            h('div',{className:'attach-item',onClick:()=>{fileRef.current.accept='image/*';fileRef.current.click()}},'📷  Фото'),
            h('div',{className:'attach-item',onClick:()=>{fileRef.current.accept='video/*';fileRef.current.click()}},'🎬  Видео'),
            h('div',{className:'attach-item',onClick:()=>{fileRef.current.accept='*/*';fileRef.current.click()}},'📎  Файл'),
            h('div',{className:'attach-item',onClick:startVnote},'⭕  Видеосообщение')
          ),
          h('button',{className:'btn btn-ghost btn-icon',title:'Прикрепить',style:{background:showAttach?'rgba(79,140,255,.15)':''},onClick:()=>setShowAttach(v=>!v)},'+'),
          h('input',{ref:fileRef,type:'file',style:{display:'none'},onChange:handleFile}),
          h('input',{
            value:text,onChange:e=>setText(e.target.value),
            onClick:()=>setShowAttach(false),
            onKeyDown:e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),doSend({type:'text',text})),
            placeholder:'Сообщение...',
            style:{borderRadius:999,padding:'9px 16px'}
          }),
          text.trim()
            ?h('button',{ref:sendBtnRef,className:'btn btn-primary',style:{borderRadius:999,padding:'9px 18px',flexShrink:0,justifyContent:'center'},onClick:()=>doSend({type:'text',text})},'→')
            :h('button',{className:'btn btn-ghost btn-icon',title:'Голосовое',style:{flexShrink:0,fontSize:18},onClick:startVoice},'🎙️')
        ),
    vnoteMode&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.93)',backdropFilter:'blur(24px)',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18}},
      h('div',{style:{fontSize:12,color:'var(--muted)',letterSpacing:'.1em'}},'ВИДЕОСООБЩЕНИЕ — ЗАПИСЬ'),
      h('video',{ref:vnoteRef,autoPlay:true,muted:true,playsInline:true,className:'vnote',style:{width:220,height:220,border:'3px solid var(--danger)',animation:'pulsered 1.4s ease-in-out infinite'}}),
      h('div',{style:{display:'flex',gap:12}},
        h('button',{className:'btn btn-ghost',style:{borderRadius:999},onClick:cancelVnote},'✕ Отмена'),
        h('button',{className:'btn btn-primary',style:{borderRadius:999,justifyContent:'center'},onClick:stopVnote},'⏹ Готово')
      )
    )
  );
}

// ── Shared preview helper ────────────────────────────────────────────────────
function previewText(p){
  if(p.type==='text') return p.text;
  if(p.type==='voice') return '🎙️ Голосовое';
  if(p.type==='video-note') return '⭕ Видеосообщение';
  if(p.type==='image') return '📷 Фото';
  if(p.type==='file-video') return '🎬 Видео';
  return '📎 Файл';
}

// ── DM Chat View ─────────────────────────────────────────────────────────────
function DMChat({me,peer,peerUser,onBack,peerInst}){
  const [msgs,setMsgs]=useState([]);
  const [peerTyping,setPeerTyping]=useState(false);
  const [callState,setCallState]=useState(null);
  const [lightbox,setLightbox]=useState(null);
  const [showMenu,setShowMenu]=useState(false);
  const [showBlock,setShowBlock]=useState(false);
  const [showDeleteChat,setShowDeleteChat]=useState(false);
  const [isBlocked,setIsBlocked]=useState(false);
  useEffect(()=>{
    if(!showMenu) return;
    const handler=()=>setShowMenu(false);
    setTimeout(()=>document.addEventListener('click',handler),0);
    return()=>document.removeEventListener('click',handler);
  },[showMenu]);
  useEffect(()=>{
    const ref=db.ref('blocked/'+me+'/'+peer);
    ref.on('value',s=>setIsBlocked(!!s.val()));
    return()=>ref.off();
  },[me,peer]);
  const bottomRef=useRef();
  const typingTO=useRef();
  const lastCount=useRef(0);
  const chatCid=useMemo(()=>dmId(me,peer),[me,peer]);

  useEffect(()=>{
    const ref=db.ref(`dm/${chatCid}/msgs`).limitToLast(100);
    ref.on('value',s=>{
      const v=s.val();
      const arr=v?Object.entries(v).map(([k,m])=>({k,...m})).sort((a,b)=>a.ts-b.ts):[];
      if(arr.length>lastCount.current&&lastCount.current>0&&arr[arr.length-1].uid!==me) playRecv();
      lastCount.current=arr.length;
      setMsgs(arr);
    });
    return()=>ref.off();
  },[chatCid]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  useEffect(()=>{db.ref(`dm/${chatCid}/unread/${me}`).set(0)},[chatCid,me]);
  useEffect(()=>{
    const ref=db.ref(`dm/${chatCid}/typing/${peer}`);
    ref.on('value',s=>setPeerTyping(!!s.val()));
    return()=>ref.off();
  },[chatCid,peer]);

  useEffect(()=>{
    if(!peerInst) return;
    const h2=call=>{
      setCallState({type:'in',call,localStream:null,remoteStream:null});
      call.on('stream',rs=>setCallState(s=>({...s,remoteStream:rs})));
      call.on('close',()=>endCall()); call.on('error',()=>endCall());
    };
    peerInst.on('call',h2);
    return()=>peerInst.off('call',h2);
  },[peerInst]);
  useEffect(()=>{
    const ref=db.ref(`calls/${me}/from/${peer}`);
    ref.on('value',s=>{if(s.val()) setCallState(c=>c||{type:'in',call:null,localStream:null,remoteStream:null})});
    return()=>ref.off();
  },[me,peer]);

  const startCall=async isVid=>{
    if(!peerInst||!peerUser?.peerId){alert('Пользователь сейчас недоступен');return}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVid}).catch(()=>navigator.mediaDevices.getUserMedia({audio:true,video:false}));
      db.ref(`calls/${peer}/from/${me}`).set({isVideo:isVid,ts:Date.now()});
      const call=peerInst.call(peerUser.peerId,stream,{metadata:{isVideo:isVid}});
      setCallState({type:'out',call,localStream:stream,remoteStream:null});
      call.on('stream',rs=>setCallState(s=>({...s,remoteStream:rs})));
      call.on('close',()=>endCall()); call.on('error',()=>endCall());
    }catch(e){alert('Нет доступа к микрофону')}
  };
  const acceptCall=async()=>{
    if(!callState?.call) return;
    try{
      const isVid=callState.call.metadata?.isVideo||false;
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVid}).catch(()=>navigator.mediaDevices.getUserMedia({audio:true,video:false}));
      callState.call.answer(stream);
      setCallState(s=>({...s,localStream:stream}));
      db.ref(`calls/${me}/from/${peer}`).remove();
    }catch(e){endCall()}
  };
  const endCall=()=>{
    callState?.call?.close();
    callState?.localStream?.getTracks().forEach(t=>t.stop());
    setCallState(null);
    db.ref(`calls/${peer}/from/${me}`).remove();
    db.ref(`calls/${me}/from/${peer}`).remove();
  };

  const send=useCallback(payload=>{
    db.ref(`dm/${chatCid}/msgs`).push({uid:me,ts:Date.now(),...payload});
    db.ref(`dm/${chatCid}/last`).set({uid:me,ts:Date.now(),preview:previewText(payload)});
    db.ref(`dm/${chatCid}/unread/${peer}`).transaction(v=>(v||0)+1);
    db.ref(`dm/${chatCid}/typing/${me}`).set(false);
  },[chatCid,me,peer]);

  const handleTyping=()=>{
    db.ref(`dm/${chatCid}/typing/${me}`).set(true);
    clearTimeout(typingTO.current);
    typingTO.current=setTimeout(()=>db.ref(`dm/${chatCid}/typing/${me}`).set(false),1500);
  };

  const grouped=useMemo(()=>{
    const g=[];let ld='';
    msgs.forEach(m=>{const d=ts2d(m.ts);if(d!==ld){g.push({type:'date',label:d});ld=d}g.push({type:'msg',m})});
    return g;
  },[msgs]);

  return h('div',{className:'flex-1 flex flex-col slide',style:{overflow:'hidden',display:'flex',flexDirection:'column',flex:1}},
    h('div',{className:'glass chat-header',style:{padding:'10px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,position:'relative'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18},onClick:onBack},'←'),
        h(Avatar,{user:peerUser,size:34}),
        h('div',null,
          h('div',{style:{display:'flex',alignItems:'center',gap:5}},
            h('div',{className:'syne',style:{fontWeight:700,fontSize:14}},peerUser?.login||'...'),
            peerUser?.email&&VERIFIED_EMAILS.includes(peerUser.email)&&h('span',{title:'Разработчик Maxify',style:{fontSize:12,background:'linear-gradient(135deg,#4f8cff,#9b8cff)',borderRadius:'50%',width:16,height:16,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700}},'✓')
          ),
          h('div',{style:{fontSize:11,color:peerUser?.online?'var(--ok)':'var(--muted)'}},peerUser?.online?'онлайн':'был(а) недавно')
        )
      ),
      h('div',{style:{display:'flex',gap:6}},
        h('button',{className:'btn btn-ghost btn-icon',title:'Аудиозвонок',onClick:()=>startCall(false)},'📞'),
        h('button',{className:'btn btn-ghost btn-icon',title:'Видеозвонок',onClick:()=>startCall(true)},'🎥'),
        h('button',{className:'btn btn-ghost btn-icon',title:'Ещё',style:{fontSize:18},onClick:()=>setShowMenu(v=>!v)},'⋯')
      ),
      showMenu&&h('div',{style:{position:'fixed',top:60,right:14,background:'var(--attach-bg)',border:'1px solid var(--border)',borderRadius:14,padding:6,zIndex:9999,display:'flex',flexDirection:'column',gap:2,minWidth:196,boxShadow:'0 12px 40px rgba(0,0,0,.6)'}},
        h('div',{className:'attach-item',onClick:()=>{setShowDeleteChat(true);setShowMenu(false)}},'🗑  Удалить переписку'),
        h('div',{className:'attach-item',style:{color:'var(--danger)'},onClick:()=>{setShowBlock(true);setShowMenu(false)}},'🚫  Заблокировать')
      )
    ),
    h('div',{className:'msgs-area',style:{flex:1,overflowY:'auto',padding:'14px 18px',display:'flex',flexDirection:'column',gap:8}},
      msgs.length===0&&h('div',{style:{textAlign:'center',color:'var(--muted)',marginTop:60,fontSize:13}},`Начните общение с ${peerUser?.login||'пользователем'}`),
      grouped.map((item,i)=>{
        if(item.type==='date') return h('div',{key:'d'+i,style:{textAlign:'center',margin:'4px 0'}},
          h('span',{style:{fontSize:11,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'3px 10px',borderRadius:999}},item.label));
        const{m}=item,mine=m.uid===me;
        return h('div',{key:m.k||m.ts,className:'msg-in',style:{display:'flex',flexDirection:'column',alignItems:mine?'flex-end':'flex-start',gap:2}},
          h(MsgBubble,{m,mine,onImgClick:url=>setLightbox(url)}),
          h('div',{style:{fontSize:10,color:'var(--muted)'}},ts2t(m.ts))
        );
      }),
      peerTyping&&h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
        h(Avatar,{user:peerUser,size:20}),
        h('div',{className:'bubble-their',style:{padding:'7px 12px',display:'flex',gap:3,alignItems:'center'}},

          h('span',{className:'d2',style:{width:5,height:5,borderRadius:'50%',background:'var(--muted)',display:'inline-block'}}),
          h('span',{className:'d3',style:{width:5,height:5,borderRadius:'50%',background:'var(--muted)',display:'inline-block'}})
        )

    ),

    callState&&h(CallOverlay,{peerUser,isVideo:callState.call?.metadata?.isVideo||false,isIncoming:callState.type==='in',onAccept:acceptCall,onEnd:endCall,localStream:callState.localStream,remoteStream:callState.remoteStream}),
    isBlocked&&h('div',{style:{position:'absolute',bottom:70,left:0,right:0,textAlign:'center',padding:'8px',background:'rgba(248,113,113,.1)',borderTop:'1px solid rgba(248,113,113,.2)',fontSize:12,color:'var(--danger)',display:'flex',justifyContent:'center',alignItems:'center',gap:8}},
      '🚫 Пользователь заблокирован',

    ),
    showBlock&&h(BlockModal,{me,peerUser,onClose:()=>setShowBlock(false),onDone:()=>{}}),
    showDeleteChat&&h(DeleteChatModal,{me,peerId:peer,peerUser,onClose:()=>setShowDeleteChat(false),onDone:()=>onBack()})

// ── Room Chat View ────────────────────────────────────────────────────────────
function RoomChat({room,me,onBack}){
  const [msgs,setMsgs]=useState([]);
  const [lightbox,setLightbox]=useState(null);
  const [showInfo,setShowInfo]=useState(false);
  const bottomRef=useRef();
  const lastCount=useRef(0);
  const canWrite=room.type==='group'||(room.type==='channel'&&room.owner===me);

  useEffect(()=>{
    const ref=db.ref(`room_msgs/${room.id}`).limitToLast(100);
    ref.on('value',s=>{
      const v=s.val();
      const arr=v?Object.entries(v).map(([k,m])=>({k,...m})).sort((a,b)=>a.ts-b.ts):[];
      if(arr.length>lastCount.current&&lastCount.current>0&&arr[arr.length-1].uid!==me) playRecv();
      lastCount.current=arr.length;
      setMsgs(arr);
    });
    return()=>ref.off();
  },[room.id]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=useCallback(payload=>{
    db.ref(`room_msgs/${room.id}`).push({uid:me,ts:Date.now(),...payload});
    db.ref('rooms/'+room.id+'/last').set({uid:me,ts:Date.now(),preview:previewText(payload)});
  },[room.id,me]);

  const [userCache,setUserCache]=useState({});
  useEffect(()=>{
    msgs.forEach(m=>{
      if(m.uid&&!userCache[m.uid]){
        db.ref('users/'+m.uid).once('value').then(s=>{
          const v=s.val();
          if(v) setUserCache(p=>({...p,[m.uid]:v}));
        });
      }
    });
  },[msgs]);

  const grouped=useMemo(()=>{
    const g=[];let ld='';
    msgs.forEach(m=>{const d=ts2d(m.ts);if(d!==ld){g.push({type:'date',label:d});ld=d}g.push({type:'msg',m})});
    return g;
  },[msgs]);

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{className:'glass',style:{padding:'10px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:18},onClick:onBack},'←'),
        h('div',{style:{width:34,height:34,borderRadius:'50%',background:room.type==='channel'?'rgba(155,140,255,.3)':'rgba(79,140,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},room.type==='channel'?'📢':'👥'),
        h('div',null,
          h('div',{className:'syne',style:{fontWeight:700,fontSize:14}},room.name),
          room.desc&&h('div',{style:{fontSize:11,color:'var(--muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},room.desc)
        )
      ),
      h('button',{className:'btn btn-ghost btn-icon',onClick:()=>setShowInfo(true)},'ℹ️')
    ),
    h('div',{className:'msgs-area',style:{flex:1,overflowY:'auto',padding:'14px 18px',display:'flex',flexDirection:'column',gap:8}},
      msgs.length===0&&h('div',{style:{textAlign:'center',color:'var(--muted)',marginTop:60,fontSize:13}},'Нет сообщений'),
      grouped.map((item,i)=>{
        if(item.type==='date') return h('div',{key:'d'+i,style:{textAlign:'center',margin:'4px 0'}},
          h('span',{style:{fontSize:11,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'3px 10px',borderRadius:999}},item.label));
        const{m}=item, mine=m.uid===me;
        const sender=userCache[m.uid];
        return h('div',{key:m.k||m.ts,className:'msg-in',style:{display:'flex',flexDirection:'column',alignItems:mine?'flex-end':'flex-start',gap:2}},
          !mine&&h('div',{style:{fontSize:11,color:'var(--muted)',marginBottom:2,display:'flex',alignItems:'center',gap:6}},
            h(Avatar,{user:sender,size:18}),sender?.login||'...'
          ),
          h(MsgBubble,{m,mine,onImgClick:url=>setLightbox(url)}),
          h('div',{style:{fontSize:10,color:'var(--muted)'}},ts2t(m.ts))
        );
      }),
      h('div',{ref:bottomRef})
    ),
    h(InputBar,{onSend:send,chatName:room.name,canWrite}),
    lightbox&&h('div',{className:'lightbox',onClick:()=>setLightbox(null)},h('img',{src:lightbox,onClick:e=>e.stopPropagation()})),
    showInfo&&h(RoomInfoModal,{room,me,onClose:()=>setShowInfo(false)})
  );
}

// ── Block Contact Modal ─────────────────────────────────────────────────────
function BlockModal({me,peerUser,onClose,onDone}){
  const [busy,setBusy]=useState(false);
  const block=async()=>{
    setBusy(true);
    await db.ref('blocked/'+me+'/'+peerUser.id).set({ts:Date.now(),login:peerUser.login});
    onDone&&onDone();onClose();setBusy(false);
  };
  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Заблокировать'),
      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'8px 0'}},
      h(Avatar,{user:peerUser,size:44}),
      h('div',null,
        h('div',{style:{fontWeight:600}},peerUser?.login),
        h('div',{style:{fontSize:12,color:'var(--muted)'}},'Пользователь не сможет писать вам')
      )
    ),
    h('div',{style:{fontSize:13,color:'var(--muted)',lineHeight:1.6,background:'rgba(248,113,113,.06)',padding:'10px 12px',borderRadius:10}},'После блокировки этот человек не сможет отправлять вам сообщения.'),
    h('div',{style:{display:'flex',gap:8}},
      h('button',{className:'btn btn-ghost',style:{flex:1,justifyContent:'center'},onClick:onClose},'Отмена'),
      h('button',{className:'btn btn-danger',style:{flex:1,justifyContent:'center'},onClick:block,disabled:busy},busy?'...':'🚫 Заблокировать')
    )
  );
}

// ── Delete Chat Modal ────────────────────────────────────────────────────────
function DeleteChatModal({me,peerId,peerUser,onClose,onDone}){
  const [busy,setBusy]=useState(false);
  const [forBoth,setForBoth]=useState(false);
  const chatCid=useMemo(()=>dmId(me,peerId),[me,peerId]);
  const del=async()=>{
    setBusy(true);
    if(forBoth){await db.ref('dm/'+chatCid).remove()}
    else{await db.ref('dm/'+chatCid+'/deletedFor/'+me).set(true)}
    onDone&&onDone();onClose();setBusy(false);
  };
  return h(Modal,{onClose},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{className:'syne',style:{fontWeight:700,fontSize:16}},'Удалить переписку'),
      h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:22},onClick:onClose},'×')
    ),
    h('div',{style:{fontSize:13,color:'var(--muted)',lineHeight:1.6}},'Все сообщения будут удалены. Это действие нельзя отменить.'),
    h('label',{style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'10px 12px',borderRadius:10,background:'var(--panel)',border:'1px solid var(--border)'}},
      h('input',{type:'checkbox',checked:forBoth,onChange:e=>setForBoth(e.target.checked),style:{width:16,height:16,accentColor:'var(--accent)',cursor:'pointer'}}),
      h('div',null,
        h('div',{style:{fontSize:13,fontWeight:600}},'Удалить у обоих'),
        h('div',{style:{fontSize:11,color:'var(--muted)'}},'Переписка исчезнет и у собеседника')
      )
    ),
    h('div',{style:{display:'flex',gap:8}},
      h('button',{className:'btn btn-ghost',style:{flex:1,justifyContent:'center'},onClick:onClose},'Отмена'),
      h('button',{className:'btn btn-danger',style:{flex:1,justifyContent:'center'},onClick:del,disabled:busy},busy?'...':'🗑 Удалить')
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [dmConvs,setDmConvs]=useState([]);
  const [rooms,setRooms]=useState([]);
  const [activeChat,setActiveChat]=useState(null);
  const [peerUsers,setPeerUsers]=useState({});
  const [showSearch,setShowSearch]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [createRoom,setCreateRoom]=useState(null);
  const [showMobileList,setShowMobileList]=useState(false);
  const [peerInst,setPeerInst]=useState(null);
  const [tab,setTab]=useState('dms');
  // FIX: track uid separately so Firebase listener isn't duplicated
  const [uid,setUid]=useState(null);
  const userListenerRef=useRef(null);

  useEffect(()=>{
    if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
  },[]);

  // FIX: proper auth → profile listener setup without duplicates
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async firebaseUser=>{
      // Cleanup old listener
      if(userListenerRef.current){
        userListenerRef.current.off();
        userListenerRef.current=null;
      }
      if(firebaseUser){
        const ref=db.ref('users/'+firebaseUser.uid);
        // Ensure profile exists first
        const snap=await ref.once('value');
        if(!snap.val()){
          await ref.set({
            id:firebaseUser.uid,
            login:firebaseUser.displayName||firebaseUser.email.split('@')[0],
            email:firebaseUser.email,
            avatarUrl:firebaseUser.photoURL||null,
            online:true,lastSeen:Date.now(),createdAt:Date.now()
          });
        } else {
          await ref.update({online:true,lastSeen:Date.now()});
        }
        // Now subscribe to live updates
        userListenerRef.current=ref;
        ref.on('value',s=>{
          const val=s.val();
          if(val){setUser(val);setUid(val.id);}
          setLoading(false);
        });
        window.addEventListener('beforeunload',()=>ref.update({online:false,lastSeen:Date.now()}));
      }else{
        setUser(null);setUid(null);setLoading(false);
      }
    });
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!uid) return;
    const id='mx-'+uid.replace(/[^a-zA-Z0-9]/g,'-');
    const p=new Peer(id,{debug:0});
    p.on('open',pid=>{setPeerInst(p);db.ref('users/'+uid).update({peerId:pid})});
    p.on('error',err=>{
      if(err.type==='unavailable-id'){
        const p2=new Peer(undefined,{debug:0});
        p2.on('open',pid=>{setPeerInst(p2);db.ref('users/'+uid).update({peerId:pid})});
        setPeerInst(p2);
      }
    });
    return()=>p.destroy();
  },[uid]);

  const loadUser=useCallback(u=>{
    if(!u) return;
    db.ref('users/'+u).on('value',s=>{const v=s.val();if(v)setPeerUsers(p=>({...p,[u]:v}))});
  },[]);

  useEffect(()=>{
    if(!uid) return;
    const ref=db.ref('dm');
    ref.on('value',s=>{
      const all=s.val()||{};
      const mine=Object.entries(all)
        .filter(([k])=>k.includes(uid))
        .map(([k,v])=>{
          const other=k.split('__').find(p=>p!==uid);
          return{uid:other,last:v.last||null,unread:v.unread?.[uid]||0};
        })
        .filter(c=>c.uid)
        .sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));
      setDmConvs(mine);
      mine.forEach(c=>loadUser(c.uid));
    });
    return()=>ref.off();
  },[uid]);

  useEffect(()=>{
    if(!uid) return;
    const ref=db.ref('rooms');
    ref.on('value',s=>{
      const all=s.val()||{};
      const mine=Object.values(all).filter(r=>r&&r.members&&r.members[uid]);
      setRooms(mine);
    });
    return()=>ref.off();
  },[uid]);

  useEffect(()=>{
    if(!uid) return;
    const ref=db.ref(`calls/${uid}/from`);
    ref.on('value',s=>{
      const v=s.val();
      if(v){const fromUid=Object.keys(v)[0];if(fromUid){loadUser(fromUid);setActiveChat({type:'dm',id:fromUid})}}
    });
    return()=>ref.off();
  },[uid]);

  const openDM=u=>{setActiveChat({type:'dm',id:u.id});loadUser(u.id)};
  const openRoom=r=>setActiveChat({type:'room',id:r.id});
  const signOut=async()=>{
    if(user) await db.ref('users/'+user.id).update({online:false,lastSeen:Date.now()});
    auth.signOut();
  };

  if(loading) return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--muted)'}},
    h('div',{style:{width:36,height:36,border:'3px solid rgba(79,140,255,.2)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}),
    h('div',{className:'syne',style:{letterSpacing:'.12em',fontSize:13}},'MAXIFY'),
    h('style',null,'@keyframes spin{to{transform:rotate(360deg)}}')
  );
  if(!user) return h(Auth);

  const activeDMPeer=activeChat?.type==='dm'?peerUsers[activeChat.id]:null;
  const activeRoom=activeChat?.type==='room'?rooms.find(r=>r.id===activeChat.id):null;
  const groups=rooms.filter(r=>r.type==='group');
  const channels=rooms.filter(r=>r.type==='channel');

  const listContent=()=>{
    if(tab==='dms') return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'8px 12px',borderRadius:12,fontSize:13,width:'100%',marginBottom:4},onClick:()=>setShowSearch(true)},'🔍  Найти пользователя'),
      dmConvs.length===0&&h('div',{style:{color:'var(--muted)',fontSize:12,textAlign:'center',padding:'16px 8px'}},'Нет переписок'),
      dmConvs.map(c=>{
        const pu=peerUsers[c.uid];
        return h('div',{key:c.uid,className:'chat-row'+(activeChat?.id===c.uid&&activeChat?.type==='dm'?' active':''),onClick:()=>{openDM({id:c.uid,...(pu||{})});setShowMobileList(false)}},
          h(Avatar,{user:pu||c.uid,size:40}),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:4}},
              pu?.login||c.uid.slice(0,8),
              pu?.email&&VERIFIED_EMAILS.includes(pu.email)&&h('span',{title:'Разработчик',style:{fontSize:11,background:'linear-gradient(135deg,#4f8cff,#9b8cff)',borderRadius:'50%',width:14,height:14,display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,flexShrink:0}},'✓')
            ),
            h('div',{style:{fontSize:12,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},c.last?.preview||'...')
          ),
          c.unread>0&&h('div',{className:'unread'},c.unread)
        );
      })
    );
    if(tab==='groups') return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'8px 12px',borderRadius:12,fontSize:13,width:'100%',marginBottom:4},onClick:()=>setCreateRoom('group')},'+ Создать группу'),
      groups.length===0&&h('div',{style:{color:'var(--muted)',fontSize:12,textAlign:'center',padding:'12px 8px'}},'Нет групп'),
      groups.map(r=>h('div',{key:r.id,className:'chat-row'+(activeChat?.id===r.id?' active':''),onClick:()=>{openRoom(r);setShowMobileList(false)}},
        h('div',{style:{width:40,height:40,borderRadius:'50%',background:'rgba(79,140,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}},'👥'),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},r.name),
          h('div',{style:{fontSize:12,color:'var(--muted)'}},r.last?.preview||r.desc||'Группа')
        )
      ))
    );
    if(tab==='channels') return h(React.Fragment,null,
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'8px 12px',borderRadius:12,fontSize:13,width:'100%',marginBottom:4},onClick:()=>setCreateRoom('channel')},'+ Создать канал'),
      channels.length===0&&h('div',{style:{color:'var(--muted)',fontSize:12,textAlign:'center',padding:'12px 8px'}},'Нет каналов'),
      channels.map(r=>h('div',{key:r.id,className:'chat-row'+(activeChat?.id===r.id?' active':''),onClick:()=>{openRoom(r);setShowMobileList(false)}},
        h('div',{style:{width:40,height:40,borderRadius:'50%',background:'rgba(155,140,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}},'📢'),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},r.name),
          h('div',{style:{fontSize:12,color:'var(--muted)'}},r.last?.preview||r.desc||'Канал')
        )
      ))
    );
  };

  const navTabs=[
    {id:'dms',   icon:'💬', label:'Чаты'},
    {id:'groups',icon:'👥', label:'Группы'},
    {id:'channels',icon:'📢',label:'Каналы'},
    {id:'profile',icon:'👤',label:'Профиль'},
  ];

  return h('div',{className:'app-layout',style:{height:'100dvh',display:'flex',padding:14,gap:12}},
    h('div',{className:'glass sidebar',style:{width:260,borderRadius:22,padding:'12px 10px',display:'flex',flexDirection:'column',gap:6,flexShrink:0}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'6px 8px',borderRadius:14,cursor:'pointer'},
        onMouseEnter:e=>e.currentTarget.style.background='rgba(255,255,255,.05)',
        onMouseLeave:e=>e.currentTarget.style.background='',
        onClick:()=>setShowProfile(true)},
        h(Avatar,{user,size:36,ring:true}),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{className:'syne',style:{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},user.login),
          h('div',{style:{fontSize:11,color:peerInst?'var(--ok)':'var(--muted)'}},peerInst?'● онлайн':'● подключение...')
        )
      ),
      h('div',{className:'hr'}),
      h('button',{className:'btn btn-ghost',style:{justifyContent:'flex-start',padding:'8px 12px',borderRadius:12,fontSize:13,width:'100%'},onClick:()=>setShowSearch(true)},'🔍  Найти пользователя'),
      h('div',{className:'tab-bar',style:{padding:'2px 0'}},
        [{id:'dms',label:'ЛС'},{id:'groups',label:'Группы'},{id:'channels',label:'Каналы'}].map(t=>
          h('div',{key:t.id,className:'tab'+(tab===t.id?' active':''),style:{flex:1,textAlign:'center'},onClick:()=>setTab(t.id)},t.label)
        )
      ),
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}},listContent()),
      h('div',{className:'hr'}),
      h('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer',padding:'6px',textAlign:'center',borderRadius:8,transition:'color .15s'},
        onMouseEnter:e=>e.target.style.color='var(--danger)',
        onMouseLeave:e=>e.target.style.color='var(--muted)',
        onClick:signOut},'Выйти')
    ),

    showMobileList&&!activeChat&&h('div',{className:'mobile-list-overlay'},
      h('div',{className:'mobile-list-header'},
        h('div',{className:'syne',style:{fontWeight:800,fontSize:20}},
          tab==='dms'?'Сообщения':tab==='groups'?'Группы':'Каналы'
        ),
        tab==='dms'&&h('button',{className:'btn btn-ghost btn-icon',onClick:()=>setShowSearch(true)},'🔍')
      ),
      h('div',{style:{padding:'8px 12px',display:'flex',flexDirection:'column',gap:2}},listContent())
    ),

    h('div',{className:'main-area',style:{flex:1,borderRadius:22,overflow:'hidden',display:'flex',flexDirection:'column'}},
      activeChat?.type==='dm'
        ?h(DMChat,{key:activeChat.id,me:user.id,peer:activeChat.id,peerUser:activeDMPeer,
            onBack:()=>{setActiveChat(null);setShowMobileList(true)},peerInst})
        :activeChat?.type==='room'&&activeRoom
          ?h(RoomChat,{key:activeRoom.id,room:activeRoom,me:user.id,
              onBack:()=>{setActiveChat(null);setShowMobileList(true)}})
          :h('div',{className:'glass',style:{flex:1,height:'100%',borderRadius:22,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}},
              h('div',{style:{fontSize:48,opacity:.15}},'💬'),
              h('div',{className:'syne',style:{fontSize:22,fontWeight:800,opacity:.2,letterSpacing:'-.03em'}},'Maxify'),
              h('div',{style:{fontSize:13,color:'var(--muted)',opacity:.5,textAlign:'center'}},'Выберите чат')
            )
    ),

    h('div',{className:'mobile-nav'},
      navTabs.map(t=>{
        const isActive=t.id==='profile'?showProfile:!activeChat&&showMobileList&&tab===t.id;
        return h('div',{
          key:t.id,
          className:'mobile-nav-btn'+(isActive?' active':''),
          onClick:()=>{
            if(t.id==='profile'){setShowProfile(true);setShowMobileList(false);return}
            setShowProfile(false);setTab(t.id);setActiveChat(null);setShowMobileList(true);
          }
        },
          h('div',{className:'nav-icon'},t.icon),
          h('div',{className:'nav-label'},t.label)
        );
      })
    ),

    showProfile&&h(ProfileModal,{user,onClose:()=>setShowProfile(false)}),
    showSearch&&h(UserSearch,{me:user.id,onSelect:u=>{openDM(u);setShowMobileList(false)},onClose:()=>setShowSearch(false)}),
    createRoom&&h(CreateRoomModal,{me:user.id,type:createRoom,onClose:()=>setCreateRoom(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
