<style>
:root{
  --bg:#07090f;--panel:rgba(255,255,255,.035);--border:rgba(255,255,255,.07);
  --accent:#4f8cff;--glow:rgba(79,140,255,.2);--text:#dde1f0;
  --muted:rgba(221,225,240,.35);--danger:#f87171;--ok:#34d399;
  --input-bg:rgba(255,255,255,.05);--bubble-mine:rgba(79,140,255,.18);
  --bubble-mine-border:rgba(79,140,255,.3);--bubble-their:rgba(255,255,255,.06);
  --bubble-their-border:rgba(255,255,255,.09);--attach-bg:rgba(13,15,26,.98);
  --nav-bg:rgba(10,12,22,.97);--bg-grad1:rgba(79,140,255,.06);--bg-grad2:rgba(155,140,255,.05);
  --pinned-bg:rgba(79,140,255,.06);--reply-bg:rgba(79,140,255,.08);
  --reaction-bg:rgba(255,255,255,.07);--reaction-mine:rgba(79,140,255,.2);
  --nav-h:62px;
}
body.light{
  --bg:#f0f2f8;--panel:rgba(255,255,255,.75);--border:rgba(0,0,0,.09);
  --accent:#2563eb;--glow:rgba(37,99,235,.15);--text:#1a1d2e;
  --muted:rgba(26,29,46,.45);--danger:#dc2626;--ok:#16a34a;
  --input-bg:rgba(0,0,0,.04);--bubble-mine:rgba(37,99,235,.12);
  --bubble-mine-border:rgba(37,99,235,.25);--bubble-their:rgba(0,0,0,.05);
  --bubble-their-border:rgba(0,0,0,.08);--attach-bg:#fff;
  --nav-bg:rgba(240,242,248,.97);--bg-grad1:rgba(37,99,235,.04);--bg-grad2:rgba(99,37,235,.03);
  --pinned-bg:rgba(37,99,235,.06);--reply-bg:rgba(37,99,235,.08);
  --reaction-bg:rgba(0,0,0,.06);--reaction-mine:rgba(37,99,235,.15);
}
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100dvh;overflow:hidden;transition:background .25s,color .25s;
  background-image:radial-gradient(ellipse 60% 40% at 75% 5%,var(--bg-grad1) 0%,transparent 70%),
  radial-gradient(ellipse 50% 40% at 5% 90%,var(--bg-grad2) 0%,transparent 70%)}
.syne{font-family:'Syne',sans-serif}
.glass{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
input,textarea,select{background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;transition:border .18s,box-shadow .18s;width:100%}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
input::placeholder,textarea::placeholder{color:var(--muted)}
.btn{border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;border-radius:12px;padding:10px 18px;font-size:13px;transition:all .2s cubic-bezier(.25,1,.5,1);letter-spacing:.02em;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#6fa4ff;transform:translateY(-2px);box-shadow:0 8px 28px var(--glow)}.btn-primary:active{transform:translateY(0);box-shadow:0 4px 16px var(--glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text)}.btn-ghost:hover{background:rgba(255,255,255,.1);transform:translateY(-1px)}.btn-ghost:active{transform:translateY(0)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.2)}.btn-danger:hover{background:rgba(248,113,113,.22);transform:translateY(-1px)}.btn-danger:active{transform:translateY(0)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:10px;font-size:16px;transition:all .2s cubic-bezier(.25,1,.5,1)}.btn-icon:hover{transform:scale(1.05)}.btn-icon:active{transform:scale(.95)}
.bubble-mine{background:var(--bubble-mine);border:1px solid var(--bubble-mine-border);border-radius:16px 4px 16px 16px}
.bubble-their{background:var(--bubble-their);border:1px solid var(--bubble-their-border);border-radius:4px 16px 16px 16px}
.msg-in{animation:msgIn .22s cubic-bezier(.34,1.56,.64,1) both}
@keyframes msgIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:none}}
.chat-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:14px;cursor:pointer;transition:background .15s}
.chat-row:hover{background:rgba(255,255,255,.05)}.chat-row.active{background:rgba(79,140,255,.1);box-shadow:inset 2px 0 0 var(--accent)}
.dot-on{width:9px;height:9px;border-radius:50%;background:var(--ok);border:2px solid var(--bg);position:absolute;bottom:1px;right:1px;animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}50%{box-shadow:0 0 0 4px rgba(52,211,153,0)}}
.call-wrap{position:fixed;inset:0;background:rgba(5,7,15,.93);backdrop-filter:blur(28px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,.6)}50%{box-shadow:0 0 0 18px rgba(79,140,255,0)}}
.ring-anim{animation:ring 1.4s ease-in-out infinite;border-radius:50%}
@keyframes pulsered{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.6)}50%{box-shadow:0 0 0 14px rgba(248,113,113,0)}}
.pulse-red{animation:pulsered 1.2s ease-in-out infinite}
.hr{width:100%;height:1px;background:var(--border)}
.slide{animation:slide .24s cubic-bezier(.25,1,.5,1) both}
@keyframes slide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{border-radius:24px;padding:28px;width:380px;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.search-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;cursor:pointer;transition:background .15s}
.search-item:hover{background:rgba(79,140,255,.1)}
.unread{background:var(--accent);color:#fff;border-radius:999px;min-width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.d1{animation:blink 1.2s 0s infinite}.d2{animation:blink 1.2s .2s infinite}.d3{animation:blink 1.2s .4s infinite}
.attach-menu{position:absolute;bottom:54px;left:0;background:var(--attach-bg);border:1px solid var(--border);border-radius:16px;padding:8px;display:flex;flex-direction:column;gap:2px;min-width:200px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.attach-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;transition:background .12s}
.attach-item:hover{background:rgba(79,140,255,.12)}
.voice-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:999px}
.voice-wave{display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:3px;border-radius:2px;background:var(--danger);animation:wave 1s ease-in-out infinite}
.voice-wave span:nth-child(1){height:6px;animation-delay:0s}.voice-wave span:nth-child(2){height:14px;animation-delay:.1s}.voice-wave span:nth-child(3){height:10px;animation-delay:.2s}.voice-wave span:nth-child(4){height:18px;animation-delay:.3s}.voice-wave span:nth-child(5){height:8px;animation-delay:.4s}.voice-wave span:nth-child(6){height:12px;animation-delay:.15s}.voice-wave span:nth-child(7){height:16px;animation-delay:.25s}
@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
audio{width:180px;height:34px}
.img-msg img{max-width:250px;max-height:190px;border-radius:14px;object-fit:cover;cursor:pointer;transition:transform .18s;display:block}
.img-msg img:hover{transform:scale(1.02)}
.vnote{width:158px;height:158px;border-radius:50%;object-fit:cover;border:2.5px solid var(--accent);background:#000;display:block}

/* Telegram-like Media Viewer */
.media-viewer-bg {position:fixed;inset:0;background:#000;z-index:9000;display:flex;align-items:center;justify-content:center;transition:background-color 0.2s;}
.media-viewer-content {max-width:100vw;max-height:100dvh;object-fit:contain;transition:transform 0.1s;cursor:grab;}
.media-viewer-content:active {cursor:grabbing;}
.media-viewer-close {position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9001;}

/* Stickers */
.sticker-img { width: 130px; height: 130px; object-fit: contain; cursor: pointer; transition: transform 0.1s; }
.sticker-img:active { transform: scale(0.95); }
.sticker-picker { position:absolute; bottom:calc(100% + 10px); right:0; background:var(--attach-bg); border:1px solid var(--border); border-radius:16px; width:280px; height:300px; display:flex; flex-direction:column; z-index:100; box-shadow:0 10px 40px rgba(0,0,0,.5); overflow:hidden; }

.prog-bar{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--accent);transition:width .2s;border-radius:2px}
@keyframes sendPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.send-pop{animation:sendPop .18s ease}
.avatar-img{border-radius:50%;object-fit:cover;display:block}
.tab-bar{display:flex;gap:4px;padding:4px}
.tab{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;color:var(--muted);font-family:'Syne',sans-serif}
.tab.active{background:rgba(79,140,255,.15);color:var(--accent)}
.tab:hover:not(.active){background:rgba(255,255,255,.05);color:var(--text)}

.pinned-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--pinned-bg);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;flex-shrink:0}
.pinned-bar:hover{background:rgba(79,140,255,.1)}
.pinned-line{width:3px;height:32px;border-radius:2px;background:var(--accent);flex-shrink:0}
.pinned-content{flex:1;min-width:0}
.pinned-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:1px}
.pinned-text{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.reply-bar{padding:8px 14px;background:var(--reply-bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.reply-preview{flex:1;min-width:0}
.reply-to-name{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:2px}
.reply-to-text{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-bubble{background:var(--reply-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:5px 10px;margin-bottom:6px;cursor:pointer}
.reply-sender{font-size:11px;color:var(--accent);font-weight:700}
.reply-msg{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}

.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;background:var(--reaction-bg);border:1px solid var(--border);cursor:pointer;font-size:12px;transition:all .15s;user-select:none}
.reaction-chip:hover{background:rgba(79,140,255,.15);border-color:var(--accent);transform:scale(1.08)}
.reaction-chip.mine{background:var(--reaction-mine);border-color:var(--accent)}
.reaction-chip .count{font-size:11px;font-weight:700;color:var(--text)}

.msg-menu{position:absolute;background:var(--attach-bg);border:1px solid var(--border);border-radius:14px;padding:6px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:170px}
.msg-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;transition:background .12s}
.msg-menu-item:hover{background:rgba(79,140,255,.12)}
.msg-menu-item.danger{color:var(--danger)}.msg-menu-item.danger:hover{background:rgba(248,113,113,.12)}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.online{background:var(--ok)}
.status-dot.offline{background:rgba(255,255,255,.2)}

.admin-badge{font-size:9px;padding:1px 6px;border-radius:999px;background:rgba(251,191,36,.15);color:#fbbf24;font-weight:700;border:1px solid rgba(251,191,36,.25)}

/* Исправления для мобильных устройств: жесткая привязка Flexbox */
.app-layout { height: 100dvh; display: flex; padding: 14px; gap: 12px; }
.main-area { flex: 1; border-radius: 22px; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.chat-header { flex-shrink: 0; }
.msgs-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
.input-wrap { flex-shrink: 0; position: relative; z-index: 10; background: var(--nav-bg); padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; alignItems: center; }

@media(max-width:640px){
  .app-layout{flex-direction:column!important;padding:0!important;gap:0!important;}
  .sidebar{display:none!important}
  .main-area{border-radius:0!important;margin-bottom:var(--nav-h)!important;}
  .chat-header{padding-top:max(12px,env(safe-area-inset-top))!important;}
  .input-wrap{padding-bottom:calc(10px + env(safe-area-inset-bottom))!important;}

  .mobile-nav-btn.active{color:var(--accent)!important;background:rgba(79,140,255,.08)!important}
  .mobile-nav-btn .nav-icon{font-size:26px;line-height:1;}
  .mobile-nav-btn .nav-label{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;}
  .mobile-list-overlay{display:flex!important;position:fixed!important;inset:0!important;bottom:var(--nav-h)!important;background:var(--bg)!important;z-index:90!important;overflow-y:auto!important;flex-direction:column!important;animation:slideUp .3s ease both}
  .mobile-list-header{display:flex!important;align-items:center!important;justify-content:space-between!important;padding:18px 16px 10px!important;padding-top:max(18px,env(safe-area-inset-top))!important;position:sticky!important;top:0!important;background:var(--bg)!important;z-index:2!important;border-bottom:1px solid var(--border)!important;}
  .modal{width:100%!important;max-height:92dvh!important;overflow-y:auto!important;border-radius:24px 24px 0 0!important;padding-bottom:calc(24px + env(safe-area-inset-bottom))!important;}
  .call-wrap{padding:20px!important}
  .btn-icon{width:44px!important;height:44px!important;min-width:44px;min-height:44px}
  .chat-row{padding:12px 14px!important;min-height:68px;}
  .bubble-mine,.bubble-their{font-size:15px!important;padding:11px 14px!important}

  .sticker-img { width: 100px; height: 100px; }
}
@media(min-width:641px){
  .mobile-nav{display:none!important}
  .mobile-list-overlay{display:none!important}
}
@media(min-width:641px) and (max-width:1024px){
  .sidebar{width:220px!important}
}

.fade-in{animation:fadeIn .18s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulsered{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.6)}50%{box-shadow:0 0 0 14px rgba(248,113,113,0)}}

/* RUTUBE / YOUTUBE */
.rt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:16px;overflow-y:auto;flex:1}
.rt-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s}
.rt-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
.rt-thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
.rt-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.rt-thumb .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px}
.rt-info{padding:10px 12px}
.rt-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-clamp:2}
.rt-meta{font-size:11px;color:var(--muted)}
.rt-player-wrap{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);}
.rt-player-inner { width: min(900px, 100vw); display: flex; flex-direction: column; gap: 12px; }
.rt-player-iframe-cont { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.rt-player-iframe-cont iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

/* FEED POSTS */
.feed-post{background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:14px}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-image{width:100%;max-height:500px;object-fit:cover;display:block;cursor:zoom-in}
.post-video{width:100%;max-height:500px;display:block;background:#000;}
.post-actions{display:flex;align-items:center;gap:14px;padding:10px 16px 4px}
.post-action-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;padding:4px;transition:transform .15s,color .15s}
.post-action-btn:hover{transform:scale(1.15);color:var(--text)}
.post-action-btn.liked{color:#f87171}
.post-caption{padding:2px 16px 10px;font-size:13px;line-height:1.6}
.post-time{padding:0 16px 12px;font-size:11px;color:var(--muted)}
</style>

function beep(freq1,freq2,dur,vol){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const g=ctx.createGain();g.connect(ctx.destination);g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);[freq1,freq2].filter(Boolean).forEach(f=>{const o=ctx.createOscillator();o.frequency.value=f;o.connect(g);o.start();o.stop(ctx.currentTime+dur)})}catch(e){}}

function _uploadCloudinary(file, cloud, preset, onPct){
  return new Promise((res,rej)=>{
    const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',preset);
    const xhr=new XMLHttpRequest(); xhr.open('POST','https://api.cloudinary.com/v1_1/'+cloud+'/auto/upload');
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{try{const j=JSON.parse(xhr.responseText); if(j.secure_url)res(j.secure_url); else rej(new Error(j.error?.message));}catch(e){rej(new Error('error'))}};
    xhr.onerror=()=>rej(new Error('network')); xhr.send(fd);
  });
}
function _uploadImgBB(file, apiKey, onPct){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=()=>{
      const fd=new FormData(); fd.append('image',r.result.split(',')[1]);
      const xhr=new XMLHttpRequest(); xhr.open('POST','https://api.imgbb.com/1/upload?key='+apiKey);
      xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
      xhr.onload=()=>{try{const j=JSON.parse(xhr.responseText); if(j.data?.url)res(j.data.url); else rej(new Error('error'));}catch(e){rej(new Error('error'))}};
      xhr.onerror=()=>rej(new Error('network')); xhr.send(fd);
    }; r.readAsDataURL(file);
  });
}
function _uploadCatbox(file, onPct){
  return new Promise((res,rej)=>{
    const fd=new FormData(); fd.append('reqtype','fileupload'); fd.append('fileToUpload',file);
    const xhr=new XMLHttpRequest(); xhr.open('POST','https://catbox.moe/user/api.php');
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onPct)onPct(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{const u=xhr.responseText.trim(); if(u.startsWith('https://'))res(u); else rej(new Error('error'))};
    xhr.onerror=()=>rej(new Error('network')); xhr.send(fd);
  });
}
async function upload(file, onPct){
  let lastErr = null;
  for(let i=0; i<UPLOAD_PROVIDERS.length; i++){
    const p = UPLOAD_PROVIDERS[(_providerIdx+i)%UPLOAD_PROVIDERS.length];
    try{
      if(p.type==='cloudinary') return await _uploadCloudinary(file, p.cloud, p.preset, onPct);
      if(p.type==='imgbb') return await _uploadImgBB(file, p.key, onPct);
      if(p.type==='catbox') return await _uploadCatbox(file, onPct);
    }catch(err){ lastErr=err; _providerIdx=(_providerIdx+1)%UPLOAD_PROVIDERS.length; }
  }
  throw new Error('Все сервисы загрузки недоступны');
}

// ── Медиа-просмотрщик (Свайп + Зум как в Telegram) ─────────────────────────
function MediaViewer({ url, type, onClose }) {
  const [dy, setDy] = useState(0);
  const startY = useRef(0);
  
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const handleTS = e => { startY.current = e.touches[0].clientY; };
  const handleTM = e => {
    const y = e.touches[0].clientY - startY.current;
    if (y > 0) setDy(y);
  };
  const handleTE = () => {
    if (dy > 120) onClose();
    else setDy(0);
  };

  const bgOpacity = Math.max(0, 1 - dy / 300);
  
  return h('div', { 
      className: 'media-viewer-bg', 
      style: { backgroundColor: `rgba(0,0,0,${bgOpacity})` },
      onClick: onClose 
    },
    h('button', { className: 'media-viewer-close', onClick: onClose }, '✕'),
    type === 'video' 
      ? h('video', { 
          src: url, controls: true, autoPlay: true, 
          className: 'media-viewer-content',
          style: { transform: `translateY(${dy}px) scale(${1 - dy/2000})` },
          onClick: e => e.stopPropagation(),
          onTouchStart: handleTS, onTouchMove: handleTM, onTouchEnd: handleTE
        })
      : h('img', { 
          src: url, 
          className: 'media-viewer-content',
          style: { transform: `translateY(${dy}px) scale(${1 - dy/2000})` },
          onClick: e => e.stopPropagation(),
          onTouchStart: handleTS, onTouchMove: handleTM, onTouchEnd: handleTE
        })
  );
}

function EmojiStickerPicker({ me, onSelectEmoji, onSelectSticker, onClose }) {
  const [tab, setTab] = useState('emoji');
  const [myStickers, setMyStickers] = useState([]);
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();

  useEffect(() => {
    const ref = db.ref('users/'+me+'/stickers');
    ref.on('value', s => {
      const v = s.val();
      setMyStickers(v ? Object.entries(v).map(([k, st]) => ({k, ...st})).reverse() : []);
    });
    return () => ref.off();
  }, [me]);

  const checkVideoDuration = (file) => new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const vid = document.createElement('video');
    vid.src = url;
    vid.onloadedmetadata = () => {
      if(vid.duration > 3.5) reject('Видео-стикер не должен превышать 3 секунды!');
      else resolve();
    };
    vid.onerror = () => reject('Ошибка чтения видео');
  });

  const uploadSticker = async e => {
    const file = e.target.files[0];
    if(!file) return;
    setUploading(true);
    try {
      const isVideo = file.type.startsWith('video/');
      if (isVideo) await checkVideoDuration(file);
      
      const url = await upload(file);
      await db.ref('users/'+me+'/stickers').push({ url, type: isVideo ? 'video' : 'image', ts: Date.now() });
    } catch (err) {
      alert(err.message || err);
    }
    setUploading(false);
    e.target.value = '';
  };

  return h('div', { className: 'sticker-picker fade-in', onClick: e => e.stopPropagation() },
    h('div', { className: 'tab-bar', style: { padding: '8px', borderBottom: '1px solid var(--border)', flexShrink: 0 } },
      h('div', { className: 'tab' + (tab==='emoji'?' active':''), style: {flex:1, textAlign:'center'}, onClick: () => setTab('emoji') }, '😀 Эмодзи'),
      h('div', { className: 'tab' + (tab==='stickers'?' active':''), style: {flex:1, textAlign:'center'}, onClick: () => setTab('stickers') }, '✨ Стикеры')
    ),
    h('div', { style: { flex: 1, overflowY: 'auto', padding: '10px', display: 'flex', flexWrap: 'wrap', gap: '8px', alignContent: 'flex-start' } },
      tab === 'emoji' && EMOJI_LIST.map(e => h('button', { key: e, className: 'emoji-btn', onClick: () => { onSelectEmoji(e); onClose(); } }, e)),
      tab === 'stickers' && h(React.Fragment, null,
        h('div', { 
          style: { width: '80px', height: '80px', borderRadius: '12px', border: '2px dashed var(--accent)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--accent)', fontSize: '11px', fontWeight: 600, textAlign: 'center' }, 
          onClick: () => fileRef.current.click() 
        }, uploading ? '...' : '+ Добавить\nдо 3 сек'),
        h('input', { ref: fileRef, type: 'file', accept: 'image/*,video/*', style: { display: 'none' }, onChange: uploadSticker }),
        myStickers.map(st => h('div', { key: st.k, style: { width: '80px', height: '80px', overflow: 'hidden', cursor: 'pointer' }, onClick: () => { onSelectSticker(st); onClose(); } },
          st.type === 'video' 
            ? h('video', { src: st.url, autoPlay: true, loop: true, muted: true, playsInline: true, className: 'sticker-img', style: { width: '100%', height: '100%' } })
            : h('img', { src: st.url, className: 'sticker-img', style: { width: '100%', height: '100%' } })

      const url=await upload(file);

    const ref=db.ref(`dm/${chatCid}/msgs`);
    ref.on('value',s=>{
      const v=s.val();
      setMsgs(v?Object.entries(v).map(([k,m])=>({k,...m})).sort((a,b)=>a.ts-b.ts):[]);
    });
    return()=>ref.off();
  },[chatCid]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView(); },[msgs]);

  const send=payload=>{
    if(editMsg){ db.ref(`dm/${chatCid}/msgs/${editMsg.k}`).update({text:payload.text,edited:true}); setEditMsg(null); }
    else {
      const d={uid:me,ts:Date.now(),...payload};
      if(replyMsg) d.replyTo={k:replyMsg.k,text:replyMsg.text,senderName:replyMsg.senderName};
      db.ref(`dm/${chatCid}/msgs`).push(d);
      db.ref(`dm/${chatCid}/last`).set({uid:me,ts:Date.now(),preview:payload.type==='text'?payload.text:'Вложение'});
      setReplyMsg(null);
    }
  };

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{className:'glass chat-header',style:{padding:'10px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}},
      h('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:20},onClick:onBack},'←'),
      h(Avatar,{user:peerUser,size:34}),
      h('div',{style:{fontWeight:700}},peerUser?.login||'...')
    ),
    h('div',{className:'msgs-area'},
      msgs.map(m=>h('div',{key:m.k,className:'msg-in',style:{display:'flex',flexDirection:'column',alignItems:m.uid===me?'flex-end':'flex-start',marginBottom:8}},
        h(MsgBubble,{ m, mine:m.uid===me, onMediaClick:setMediaView, onEdit:setEditMsg, onDelete:msg=>db.ref(`dm/${chatCid}/msgs/${msg.k}`).remove(), onReply:msg=>setReplyMsg({...msg,senderName:m.uid===me?'Вы':peerUser?.login}), onReact:(msg,e)=>db.ref(`dm/${chatCid}/msgs/${msg.k}/reactions/${me}`).set(e), replyMsg:m.replyTo })
      )),
      h('div',{ref:bottomRef})
    ),
    h(InputBar,{me, onSend:send, chatName:peerUser?.login, editMsg, onCancelEdit:()=>setEditMsg(null), replyMsg, onCancelReply:()=>setReplyMsg(null)}),
    mediaView&&h(MediaViewer,{url:mediaView.url, type:mediaView.type, onClose:()=>setMediaView(null)})
  );
}

function RoomChat({room,me,onBack}){
  const [msgs,setMsgs]=useState([]);
  const [mediaView,setMediaView]=useState(null);
  const [editMsg,setEditMsg]=useState(null);
  const bottomRef=useRef();

  useEffect(()=>{
    const ref=db.ref(`room_msgs/${room.id}/messages`);
    ref.on('value',s=>setMsgs(s.val()?Object.entries(s.val()).map(([k,m])=>({k,...m})).sort((a,b)=>a.ts-b.ts):[]));
    return()=>ref.off();
  },[room.id]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView(); },[msgs]);

  const send=payload=>{
    if(editMsg){ db.ref(`room_msgs/${room.id}/messages/${editMsg.k}`).update({text:payload.text,edited:true}); setEditMsg(null); }
    else {
      db.ref(`room_msgs/${room.id}/messages`).push({uid:me,ts:Date.now(),...payload});
      db.ref('rooms/'+room.id+'/last').set({uid:me,ts:Date.now(),preview:payload.type==='text'?payload.text:'Вложение'});
    }
  };

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{className:'glass chat-header',style:{padding:'10px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}},
      h('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:20},onClick:onBack},'←'),
      h('div',{style:{width:34,height:34,borderRadius:'50%',background:'rgba(79,140,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},'👥'),
      h('div',{style:{fontWeight:700}},room.name)
    ),
    h('div',{className:'msgs-area'},
      msgs.map(m=>h('div',{key:m.k,className:'msg-in',style:{display:'flex',flexDirection:'column',alignItems:m.uid===me?'flex-end':'flex-start',marginBottom:8}},
        h(MsgBubble,{ m, mine:m.uid===me, onMediaClick:setMediaView, onEdit:setEditMsg, onDelete:msg=>db.ref(`room_msgs/${room.id}/messages/${msg.k}`).remove(), onReact:(msg,e)=>db.ref(`room_msgs/${room.id}/messages/${msg.k}/reactions/${me}`).set(e) })
      )),
      h('div',{ref:bottomRef})
    ),
    h(InputBar,{me, onSend:send, chatName:room.name, editMsg, onCancelEdit:()=>setEditMsg(null)}),
    mediaView&&h(MediaViewer,{url:mediaView.url, type:mediaView.type, onClose:()=>setMediaView(null)})
  );
}

// ── Rutube / YouTube Оптимизированный плеер ──────────────────────────────────
function RTPlayer({video, onClose}){
  const isYT = video.src==='yt';
  const embedSrc = isYT
    ? 'https://www.youtube.com/embed/'+video.id+'?autoplay=1&rel=0'
    : 'https://rutube.ru/play/embed/'+video.id+'?autoplay=1&skinColor=ff4444';
  
  return h('div', {className:'rt-player-wrap'},
    h('div', {className:'rt-player-inner'},
      h('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}},
        h('div', {style:{fontWeight:600, fontSize:16, color:'#fff', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}, video.title),
        h('button', {className:'btn btn-danger', style:{borderRadius:999, padding:'8px 20px', fontWeight:800}, onClick:onClose}, '✕ Закрыть')
      ),
      h('div', {className: 'rt-player-iframe-cont'},
        h('iframe', {src:embedSrc, allow:'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture', allowFullScreen:true})
      ),
      h('div', {style:{color:'rgba(255,255,255,.6)', fontSize:14, textAlign:'center'}}, video.channel)
    )
  );
}

const RT_CATEGORIES = ['Тренды','Новости','Спорт','Музыка','Кино','Природа','Технологии','Кулинария'];

function RutubeTab(){
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [busy, setBusy] = useState(false);
  const [playing, setPlaying] = useState(null);

  const search = async(q) => {
    if(!q.trim()) return;
    setBusy(true); setResults([]);
    try{
      const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://rutube.ru/api/search/video/?query='+encodeURIComponent(q)+'&format=json&fields=id,title,author,thumbnail_url,duration'));
      const data=await res.json();
      const items=(data.results||data||[]).slice(0,24);
      setResults(items.map(v=>({id:v.id||v.video_id, title:v.title||'Видео', channel:v.author?.name||'', thumb:v.thumbnail_url||v.poster||'', duration:v.duration?fmtDur(v.duration):'', src:'rt'})).filter(v=>v.id));
    }catch(e){ alert('Ошибка поиска'); }
    setBusy(false);
  };

  const VideoCard=(v)=>h('div',{key:v.id,className:'rt-card',onClick:()=>setPlaying(v)},
    h('div',{className:'rt-thumb'},
      h('img',{src:v.thumb,loading:'lazy'}),
      v.duration&&h('div',{className:'duration'},v.duration),
      h('div',{className:'play-icon'},h('div',{style:{width:44,height:44,borderRadius:'50%',background:'rgba(255,68,68,.9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'▶'))
    ),
    h('div',{className:'rt-info'}, h('div',{className:'rt-title'},v.title), h('div',{className:'rt-meta'},v.channel))
  );

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{className:'rt-search-bar'},
      h('input',{placeholder:'Поиск на Rutube...',value:query,onChange:e=>setQuery(e.target.value),onKeyDown:e=>e.key==='Enter'&&search(query)}),
      h('button',{className:'btn btn-primary',onClick:()=>search(query),disabled:busy},busy?'...':'Найти')
    ),
    h('div',{style:{display:'flex',gap:8,padding:'8px 16px',overflowX:'auto',flexShrink:0}},
      RT_CATEGORIES.map(cat=>h('button',{key:cat,className:'btn btn-ghost',style:{borderRadius:999,padding:'5px 14px'},onClick:()=>{setQuery(cat);search(cat)}},cat))
    ),
    h('div',{className:'rt-grid'}, results.map(v=>VideoCard(v)) ),
    playing&&h(RTPlayer,{video:playing, onClose:()=>setPlaying(null)})
  );
}

// ── Feed (Лента) ─────────────────────────────────────────────────────────────
function CreatePostModal({me, user, onClose}){
  const [text,setText]=useState('');
  const [file,setFile]=useState(null);
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef();

  const handleFile=e=>{ setFile(e.target.files[0]); };

  const post=async()=>{
    if(!text.trim()&&!file)return;
    setUploading(true);
    try{
      let mediaUrl=null,mediaType=null;
      if(file){mediaUrl=await upload(file); mediaType=file.type.startsWith('video/')?'video':'image';}
      await db.ref('posts').push().set({uid:me, login:user.login, avatarUrl:user.avatarUrl||null, text:text.trim(), mediaUrl, mediaType, ts:Date.now()});
      onClose();
    }catch(e){alert('Ошибка: '+e.message)}
    setUploading(false);
  };

  return h(Modal,{onClose},
    h('div',{className:'syne',style:{fontWeight:700,fontSize:16,marginBottom:10}},'Новый пост'),
    h('textarea',{value:text,onChange:e=>setText(e.target.value),placeholder:'Что нового?',rows:4}),
    file&&h('div',{style:{color:'var(--ok)',fontSize:12,margin:'5px 0'}},'Файл прикреплен: '+file.name),
    h('div',{style:{display:'flex',gap:8,marginTop:10}},
      h('button',{className:'btn btn-ghost',style:{flex:1},onClick:()=>fileRef.current.click()},'📷 Фото/Видео'),
      h('button',{className:'btn btn-primary',style:{flex:1},onClick:post,disabled:uploading},uploading?'...':'Опубликовать')
    ),
    h('input',{ref:fileRef,type:'file',accept:'image/*,video/*',style:{display:'none'},onChange:handleFile})
  );
}

function PostCard({post, me}){
  const [liked,setLiked]=useState(!!(post.likes&&post.likes[me]));
  const [likeCount,setLikeCount]=useState(Object.keys(post.likes||{}).length);
  const [mediaView,setMediaView]=useState(null);

  const toggleLike=async()=>{
    const ref=db.ref('posts/'+post.k+'/likes/'+me);
    if(liked){await ref.remove();setLikeCount(c=>c-1);} else{await ref.set(true);setLikeCount(c=>c+1);}
    setLiked(!liked);
  };

  return h('div',{className:'feed-post'},
    h('div',{className:'post-header'},
      h(Avatar,{user:{login:post.login, avatarUrl:post.avatarUrl},size:38}),
      h('div',{style:{flex:1}}, h('div',{style:{fontWeight:700,fontSize:14}},post.login||'Пользователь'), h('div',{style:{fontSize:11,color:'var(--muted)'}},ts2d(post.ts)+' '+ts2t(post.ts))),
      post.uid===me&&h('button',{style:{background:'none',border:'none',color:'var(--danger)',cursor:'pointer'},onClick:()=>db.ref('posts/'+post.k).remove()},'🗑')
    ),
    post.text&&h('div',{className:'post-caption'},post.text),
    post.mediaUrl&&(post.mediaType==='video'
      ?h('video',{src:post.mediaUrl,controls:true,className:'post-video'})
      :h('img',{src:post.mediaUrl,className:'post-image',onClick:()=>setMediaView({url:post.mediaUrl, type:'image'})})
    ),
    h('div',{className:'post-actions'}, h('button',{className:'post-action-btn'+(liked?' liked':''),onClick:toggleLike},liked?'❤️':'🤍',h('span',{style:{fontSize:13,marginLeft:4}},likeCount||'')) ),
    mediaView&&h(MediaViewer,{url:mediaView.url, type:mediaView.type, onClose:()=>setMediaView(null)})
  );
}

function FeedTab({me, user}){
  const [posts,setPosts]=useState([]);
  const [showCreate,setShowCreate]=useState(false);

  useEffect(()=>{
    const ref=db.ref('posts').orderByChild('ts').limitToLast(50);
    ref.on('value',s=>{
      const v=s.val()||{};
      setPosts(Object.entries(v).map(([k,p])=>({k,...p})).sort((a,b)=>b.ts-a.ts));
    });
    return()=>ref.off();
  },[]);

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{padding:'10px 16px',borderBottom:'1px solid var(--border)',flexShrink:0}},
      h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center'},onClick:()=>setShowCreate(true)},'+ Создать пост')
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:'14px 16px'}},
      posts.map(p=>h(PostCard,{key:p.k,post:p,me}))
    ),
    showCreate&&h(CreatePostModal,{me,user,onClose:()=>setShowCreate(false)})
  );
}

// ── Главное приложение ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null); const [loading,setLoading]=useState(true);
  const [dmConvs,setDmConvs]=useState([]); const [rooms,setRooms]=useState([]);
  const [activeChat,setActiveChat]=useState(null); const [peerUsers,setPeerUsers]=useState({});
  const [tab,setTab]=useState('dms'); const [showFeed,setShowFeed]=useState(false); const [showRT,setShowRT]=useState(false);
  const [showMobileList,setShowMobileList]=useState(true);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fu=>{
      if(fu){
        const ref=db.ref('users/'+fu.uid); const snap=await ref.once('value');
        if(!snap.val()) await ref.set({id:fu.uid,login:fu.displayName||fu.email.split('@')[0],email:fu.email,avatarUrl:fu.photoURL||null,online:true,lastSeen:Date.now()});
        else await ref.update({online:true});
        ref.on('value',s=>{ setUser(s.val()); setLoading(false); });
      }else{ setUser(null); setLoading(false); }
    });
    return()=>unsub();
  },[]);

  const loadUser=useCallback(u=>{if(!u)return;db.ref('users/'+u).once('value').then(s=>{if(s.val())setPeerUsers(p=>({...p,[u]:s.val()}))})},[]);

  useEffect(()=>{
    if(!user?.id)return;
    db.ref('dm').on('value',s=>{
      const all=s.val()||{};
      const mine=Object.entries(all).filter(([k])=>k.includes(user.id)).map(([k,v])=>{const other=k.split('__').find(p=>p!==user.id);return{uid:other,last:v.last||null,unread:v.unread?.[user.id]||0}}).filter(c=>c.uid).sort((a,b)=>(b.last?.ts||0)-(a.last?.ts||0));
      setDmConvs(mine); mine.forEach(c=>loadUser(c.uid));
    });
    db.ref('rooms').on('value',s=>{ setRooms(Object.values(s.val()||{}).filter(r=>r&&r.members&&r.members[user.id])); });
  },[user?.id, loadUser]);

  const openDM=u=>{ setActiveChat({type:'dm',id:u.id}); loadUser(u.id); setShowFeed(false); setShowRT(false); };
  const openRoom=r=>{ setActiveChat({type:'room',id:r.id}); setShowFeed(false); setShowRT(false); };

  if(loading) return h('div',{style:{height:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',fontSize:24}},'Загрузка...');
  if(!user) return h(Auth);

  const activeDMPeer=activeChat?.type==='dm'?peerUsers[activeChat.id]:null;
  const activeRoom=activeChat?.type==='room'?rooms.find(r=>r.id===activeChat.id):null;

  const listContent=()=>{
    if(tab==='dms') return dmConvs.map(c=>{const pu=peerUsers[c.uid];return h('div',{key:c.uid,className:'chat-row'+(activeChat?.id===c.uid?' active':''),onClick:()=>{openDM({id:c.uid});setShowMobileList(false)}}, h(Avatar,{user:pu||c.uid}), h('div',{style:{flex:1}},h('div',{style:{fontWeight:600}},pu?.login||c.uid),h('div',{style:{fontSize:12,color:'var(--muted)'}},c.last?.preview||'...')))});
    if(tab==='groups') return rooms.filter(r=>r.type==='group').map(r=>h('div',{key:r.id,className:'chat-row'+(activeChat?.id===r.id?' active':''),onClick:()=>{openRoom(r);setShowMobileList(false)}}, h('div',{style:{width:36,height:36,borderRadius:'50%',background:'rgba(79,140,255,.2)',display:'flex',alignItems:'center',justifyContent:'center'}},'👥'), h('div',{style:{flex:1}},h('div',{style:{fontWeight:600}},r.name))));
    return null;
  };

  return h('div',{className:'app-layout'},
    h('div',{className:'glass sidebar',style:{width:260,borderRadius:22,padding:'12px 10px',display:'flex',flexDirection:'column',gap:6}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'6px 8px'}}, h(Avatar,{user,size:36}), h('div',{style:{fontWeight:700}},user.login) ),
      h('div',{className:'hr'}),
      h('div',{className:'tab-bar'},
        [{id:'dms',label:'ЛС'},{id:'groups',label:'Группы'}].map(t=>h('div',{key:t.id,className:'tab'+(tab===t.id?' active':''),style:{flex:1,textAlign:'center'},onClick:()=>{setTab(t.id);setShowRT(false);setShowFeed(false);}},t.label))
      ),
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}},listContent()),
      h('div',{className:'hr'}),
      h('button',{className:'btn btn-ghost',onClick:()=>{setShowFeed(true);setShowRT(false);setActiveChat(null);setShowMobileList(false);}},'📸 Лента'),
      h('button',{className:'btn btn-ghost',onClick:()=>{setShowRT(true);setShowFeed(false);setActiveChat(null);setShowMobileList(false);}},'▶️ Rutube'),
      h('button',{className:'btn btn-ghost',style:{color:'var(--danger)'},onClick:()=>auth.signOut()},'Выйти')
    ),

    showMobileList&&!activeChat&&!showFeed&&!showRT&&h('div',{className:'mobile-list-overlay'},
      h('div',{className:'mobile-list-header'}, h('div',{className:'syne',style:{fontWeight:800,fontSize:20}},tab==='dms'?'Сообщения':'Группы')),
      h('div',{style:{padding:'8px 12px'}},listContent())
    ),

    h('div',{className:'main-area'},
      showRT ? h('div',{className:'glass',style:{flex:1,display:'flex',flexDirection:'column'}}, h(RutubeTab,{})) :
      showFeed ? h('div',{className:'glass',style:{flex:1,display:'flex',flexDirection:'column'}}, h(FeedTab,{me:user.id, user})) :
      activeChat?.type==='dm' ? h(DMChat,{me:user.id,peer:activeChat.id,peerUser:activeDMPeer,onBack:()=>{setActiveChat(null);setShowMobileList(true)}}) :
      activeChat?.type==='room' ? h(RoomChat,{room:activeRoom,me:user.id,onBack:()=>{setActiveChat(null);setShowMobileList(true)}}) :
      h('div',{className:'glass',style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}},'Выберите чат')
    ),

    h('div',{className:'mobile-nav'},
      [{id:'dms',icon:'💬'},{id:'feed',icon:'📸'},{id:'rt',icon:'▶️'}].map(t=>
        h('div',{key:t.id,className:'mobile-nav-btn'+((t.id==='rt'&&showRT)||(t.id==='feed'&&showFeed)||(t.id==='dms'&&!showRT&&!showFeed)?' active':''),onClick:()=>{
          if(t.id==='rt'){setShowRT(true);setShowFeed(false);setActiveChat(null);setShowMobileList(false);}
          else if(t.id==='feed'){setShowFeed(true);setShowRT(false);setActiveChat(null);setShowMobileList(false);}
          else{setShowRT(false);setShowFeed(false);setTab('dms');setActiveChat(null);setShowMobileList(true);}
        }}, h('div',{className:'nav-icon'},t.icon))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
